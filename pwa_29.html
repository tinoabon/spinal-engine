<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tendra">
<meta name="theme-color" content="#0A0D0F">
<meta name="mobile-web-app-capable" content="yes">
<title>Tendra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- PWA Manifest inline -->
<script>
const manifestData = {
  name: "Tendra",
  short_name: "Spinal",
  description: "Your chiropractic activation protocol",
  start_url: "/spinal-engine/pwa.html",
  display: "standalone",
  background_color: "#0A0D0F",
  theme_color: "#0A0D0F",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%230A0D0F'/><circle cx='96' cy='96' r='28' fill='none' stroke='%238FAF94' stroke-width='6'/><circle cx='96' cy='96' r='8' fill='%23C8B89A'/></svg>", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='110' fill='%230A0D0F'/><circle cx='256' cy='256' r='76' fill='none' stroke='%238FAF94' stroke-width='16'/><circle cx='256' cy='256' r='22' fill='%23C8B89A'/></svg>", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const link = document.createElement('link');
link.rel = 'manifest';
link.href = URL.createObjectURL(blob);
document.head.appendChild(link);
</script>

<style>
:root {
  --bg:     #0A0D0F;
  --bg2:    #111518;
  --bg3:    #181D21;
  --bg4:    #1E2429;
  --line:   #232A30;
  --line2:  #2A3340;
  --txt:    #E8E2D9;
  --txt2:   #A89F94;
  --txt3:   #6B6560;
  --txt4:   #3D3A37;
  --accent: #C8B89A;
  --accent2:#8FAF94;
  --accent3:#7BA3C4;
  --danger: #C47A7A;
  --warn:   #C4A87A;
  --r:      16px;
  --r-sm:   10px;
  --r-lg:   22px;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  overscroll-behavior: none;
  overflow: hidden;
}

.serif { font-family: 'DM Serif Display', serif; }

/* ── SCREENS ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  background: var(--bg);
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}
.screen.active { transform: translateY(0); }
.screen.slide-left { transform: translateX(-100%); }
.screen.slide-left.active { transform: translateX(0); }

/* ── PIN SCREEN ── */
#screen-pin {
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: calc(var(--safe-top) + 20px) 24px calc(var(--safe-bottom) + 24px);
}
.pin-logo {
  display: flex; align-items: center; gap: 10px;
}
.pin-logo-dot {
  flex-shrink: 0;
  filter: drop-shadow(0 0 8px rgba(143,175,148,.35));
}
.pin-logo-name {
  font-family: 'DM Serif Display', serif;
  font-size: 22px; color: var(--txt);
  letter-spacing: .02em;
}
.pin-headline {
  text-align: center;
}
.pin-headline h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 28px; color: var(--txt);
  line-height: 1.2; margin-bottom: 6px;
}
.pin-headline p { font-size: 15px; color: var(--txt3); }
.pin-dots {
  display: flex; gap: 14px;
}
.pin-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--bg4);
  border: 2px solid var(--line2);
  transition: background .15s, border-color .15s, transform .1s;
}
.pin-dot.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }
.pin-dot.error { background: var(--danger); border-color: var(--danger); }
.pin-display { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.pin-display.shake { animation: shake .4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px; width: 100%; max-width: 300px;
}
.np-key {
  background: var(--bg3);
  border: 1px solid var(--line2);
  border-radius: var(--r);
  height: 72px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  user-select: none;
  transition: background .1s, transform .08s;
  -webkit-user-select: none;
}
.np-key:active { background: var(--bg4); transform: scale(.95); }
.np-key.del { background: transparent; border-color: var(--line); }
.np-num { font-size: 24px; font-weight: 300; color: var(--txt); line-height: 1; }
.np-alpha { font-size: 10px; color: var(--txt4); letter-spacing: .1em; margin-top: 2px; }
.pin-error-msg {
  font-size: 13px; color: var(--danger); text-align: center;
  min-height: 18px;
}

/* ── MAIN APP ── */
#screen-app {
  display: flex; flex-direction: column;
}

/* ── TOP BAR ── */
.app-topbar {
  padding: calc(var(--safe-top) + 12px) 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
}
.topbar-logo { display: flex; align-items: center; gap: 8px; }
.topbar-logo-dot { flex-shrink: 0; }
.topbar-logo-name { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--txt); }
.topbar-patient {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
}
.topbar-av {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg4); border: 1px solid var(--line2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; color: var(--txt2);
}
.topbar-name { font-size: 14px; color: var(--txt2); }

/* ── SCROLL CONTENT ── */
.app-content {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--safe-bottom) + 80px);
}

/* ── TAB BAR ── */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(60px + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--bg2);
  border-top: 1px solid var(--line);
  display: flex;
  z-index: 100;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; cursor: pointer;
  transition: color .15s;
  color: var(--txt4);
  -webkit-user-select: none;
}
.tab-item.active { color: var(--accent2); }
.tab-icon { font-size: 20px; line-height: 1; }
.tab-label { font-size: 10px; letter-spacing: .04em; text-transform: uppercase; }

/* ── TAB PANELS ── */
.tab-panel { display: none; padding: 20px; }
.tab-panel.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 14px;
}
.card-hd {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 13px; font-weight: 500; color: var(--txt2); text-transform: uppercase; letter-spacing: .06em; }
.card-body { padding: 16px 18px; }

/* ── HOME TAB ── */
.home-hero {
  background: linear-gradient(135deg, rgba(143,175,148,.08) 0%, transparent 60%);
  border: 1px solid rgba(143,175,148,.15);
  border-radius: var(--r-lg);
  padding: 24px 20px;
  margin-bottom: 14px;
}
.home-greeting {
  font-size: 13px; color: var(--txt3); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: .08em;
}
.home-name {
  font-family: 'DM Serif Display', serif;
  font-size: 32px; color: var(--txt);
  line-height: 1.1; margin-bottom: 4px;
}
.home-plan {
  font-size: 13px; color: var(--accent);
}
.home-stats {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 10px; margin-top: 20px;
}
.home-stat {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--line2);
  border-radius: var(--r-sm);
  padding: 12px 10px;
  text-align: center;
}
.home-stat-val {
  font-family: 'DM Serif Display', serif;
  font-size: 26px; color: var(--txt);
  line-height: 1;
}
.home-stat-lbl { font-size: 10px; color: var(--txt3); margin-top: 3px; text-transform: uppercase; letter-spacing: .06em; }

.next-visit-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 16px 18px;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 14px;
}
.next-visit-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(200,184,154,.1);
  border: 1px solid rgba(200,184,154,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.next-visit-lbl { font-size: 11px; color: var(--txt3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
.next-visit-val { font-size: 16px; color: var(--txt); font-weight: 500; }
.next-visit-sub { font-size: 12px; color: var(--txt3); margin-top: 2px; }

/* ── PROTOCOL TAB ── */
.ex-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.ex-card:active { background: var(--bg3); border-color: var(--line2); }
.ex-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg4); border: 1px solid var(--line2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--txt3); flex-shrink: 0;
}
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 15px; color: var(--txt); font-weight: 500; margin-bottom: 2px; }
.ex-meta { font-size: 12px; color: var(--txt3); }
.ex-dur {
  font-family: 'DM Serif Display', serif;
  font-size: 18px; color: var(--accent);
  flex-shrink: 0;
}
.protocol-total {
  text-align: center; padding: 14px;
  font-size: 13px; color: var(--txt3);
  border-top: 1px solid var(--line);
  margin-top: 4px;
}
.protocol-total span { color: var(--txt); font-weight: 500; }

/* ── HISTORY TAB ── */
.session-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
}
.session-row:last-child { border-bottom: none; }
.session-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent2); flex-shrink: 0;
}
.session-date { font-size: 13px; color: var(--txt2); min-width: 64px; }
.session-info { flex: 1; }
.session-steps { font-size: 14px; color: var(--txt); }
.session-dur { font-size: 12px; color: var(--txt3); margin-top: 1px; }
.session-check {
  font-size: 12px; color: var(--accent2);
}

/* ── PROGRESS TAB ── */
.streak-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px; margin: 4px 0 12px;
}
.s-cell {
  aspect-ratio: 1;
  border-radius: 5px;
  background: var(--bg4);
}
.s-cell.done { background: var(--accent2); }
.s-cell.today {
  background: var(--accent);
  box-shadow: 0 0 0 2px rgba(200,184,154,.25);
}
.s-cell.future { background: transparent; border: 1px solid var(--line); opacity: .3; }

.day-label {
  font-size: 10px; color: var(--txt4);
  text-align: center; text-transform: uppercase;
  letter-spacing: .05em;
}

.comp-row {
  display: flex; gap: 10px; justify-content: space-around;
  padding: 8px 0;
}
.comp-item { text-align: center; }
.comp-ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; }
.comp-ring-txt { position: absolute; text-align: center; }
.comp-pct { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--txt); line-height: 1; }
.comp-days { font-size: 10px; color: var(--txt3); margin-top: 5px; }
.comp-count { font-size: 11px; color: var(--txt3); }

.streak-number {
  font-family: 'DM Serif Display', serif;
  font-size: 56px; color: var(--accent2);
  line-height: 1; text-align: center;
}
.streak-label { font-size: 13px; color: var(--txt3); text-align: center; margin-top: 4px; }

/* ── JOURNEY: 14-day activity sparkline ── */
.spark-wrap {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 4px;
  height: 56px;
  padding: 4px 0 6px;
}
.spark-bar {
  flex: 1;
  min-height: 3px;
  border-radius: 3px 3px 1px 1px;
  background: var(--bg4);
  transition: background .2s;
}
.spark-bar.active { background: var(--accent2); }
.spark-bar.today  { background: var(--accent); box-shadow: 0 0 0 2px rgba(200,184,154,.25); }
.spark-axis {
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--txt4);
  letter-spacing: .04em; text-transform: uppercase;
  margin-top: 2px;
}

/* ── JOURNEY: headline stats row ── */
.j-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 4px 0;
}
.j-stat {
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 8px;
  text-align: center;
}
.j-stat-num {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--txt);
  line-height: 1;
}
.j-stat-lbl {
  font-size: 10px; color: var(--txt3);
  letter-spacing: .06em; text-transform: uppercase;
  margin-top: 6px;
}

/* ── EDUCATION ── */
.edu-hero {
  background: linear-gradient(135deg, rgba(143,175,148,.10), rgba(123,163,196,.08));
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 18px 16px;
  margin-bottom: 14px;
}
.edu-hero-title {
  font-family: 'DM Serif Display', serif;
  font-size: 19px; color: var(--txt);
  line-height: 1.2; margin-bottom: 4px;
}
.edu-hero-sub { font-size: 12px; color: var(--txt3); line-height: 1.5; }
.edu-section-hd {
  font-size: 11px; color: var(--txt3);
  letter-spacing: .08em; text-transform: uppercase;
  margin: 18px 4px 10px;
}
.edu-list {
  display: flex; flex-direction: column;
  gap: 8px;
}
.edu-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px 14px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.edu-card:active { background: var(--bg4); }
.edu-card.featured {
  border-color: rgba(143,175,148,.35);
  background: rgba(143,175,148,.06);
}
.edu-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--bg4);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--accent2);
  flex-shrink: 0;
}
.edu-card.featured .edu-icon {
  background: rgba(143,175,148,.15); color: var(--accent2);
}
.edu-body { flex: 1; min-width: 0; }
.edu-title {
  font-size: 14px; color: var(--txt);
  font-weight: 500; line-height: 1.3;
}
.edu-meta {
  font-size: 11px; color: var(--txt3);
  margin-top: 3px;
}
.edu-arrow { color: var(--txt4); font-size: 18px; flex-shrink: 0; }

/* ── LOADING ── */
.loading-spinner {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 200px; gap: 14px; color: var(--txt3);
  font-size: 14px;
}
.spinner {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--bg4);
  border-top-color: var(--accent2);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px; gap: 10px;
  color: var(--txt3); text-align: center;
}
.empty-icon { font-size: 32px; opacity: .3; }
.empty-title { font-size: 15px; color: var(--txt2); }
.empty-sub { font-size: 13px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(70px + var(--safe-bottom));
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--bg3); border: 1px solid var(--line2);
  border-radius: 100px; padding: 10px 20px;
  font-size: 13px; color: var(--txt);
  opacity: 0; transition: opacity .2s, transform .2s;
  z-index: 200; white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── INSTALL BANNER ── */
.install-banner {
  margin: 0 0 14px;
  background: rgba(200,184,154,.08);
  border: 1px solid rgba(200,184,154,.2);
  border-radius: var(--r);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
}
.install-banner-icon { font-size: 22px; flex-shrink: 0; }
.install-banner-body { flex: 1; }
.install-banner-title { font-size: 14px; font-weight: 500; color: var(--txt); }
.install-banner-sub { font-size: 12px; color: var(--txt3); margin-top: 2px; }
.install-banner-btn {
  background: var(--accent); color: var(--bg);
  border: none; border-radius: 8px;
  padding: 8px 14px; font-size: 12px; font-weight: 500;
  cursor: pointer; flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
}
.install-banner-x {
  color: var(--txt4); cursor: pointer; font-size: 18px;
  flex-shrink: 0; padding: 2px;
}

/* ── LOGOUT BTN ── */
.logout-btn {
  background: transparent;
  border: 1px solid var(--line2);
  border-radius: var(--r-sm);
  color: var(--txt3); font-size: 12px;
  padding: 5px 12px; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: color .15s, border-color .15s;
}
.logout-btn:active { color: var(--txt); border-color: var(--line3); }

/* ── HOME PRACTICE PLAYER ── */
#screen-practice {
  background: var(--bg);
  display: flex; flex-direction: column;
  z-index: 50;
}
.practice-hd {
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.practice-back {
  font-size: 14px; color: var(--txt2); cursor: pointer;
  padding: 6px 0; background: none; border: none;
  font-family: 'DM Sans', sans-serif;
}
.practice-title { font-size: 14px; font-weight: 500; color: var(--txt); }
.practice-step-ct { font-size: 13px; color: var(--txt3); }

.practice-body {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 30px 24px;
  gap: 24px;
  padding-bottom: calc(var(--safe-bottom) + 100px);
}

/* Ring timer */
.prac-ring-wrap {
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.prac-ring-svg { transform: rotate(-90deg); }
.prac-ring-track { fill: none; stroke: var(--bg4); }
.prac-ring-prog { fill: none; stroke-linecap: round; transition: stroke-dashoffset .9s linear, stroke .4s; }
.prac-ring-center {
  position: absolute; text-align: center;
  display: flex; flex-direction: column; align-items: center;
}
.prac-ring-time {
  font-family: 'DM Serif Display', serif;
  font-size: 52px; color: var(--txt); line-height: 1;
}
.prac-ring-unit { font-size: 14px; color: var(--txt3); margin-top: 4px; }

/* Video-first layout: when an exercise has a demo video, the video is the
   hero and the timer collapses to a compact ring beside the time text. */
.practice-body.video-mode {
  justify-content: flex-start;
  gap: 14px;
  /* The controls are position:fixed over this scroll area; leave room so
     the compact timer never slides underneath them. */
  padding-bottom: calc(var(--safe-bottom) + 215px);
}
/* When the video layout is active, trim the fixed controls a touch so the
   compact timer gets more air. Scoped via body class set by the runner. */
body.prac-video-mode .prac-btn-primary { padding: 14px; font-size: 19px; }
body.prac-video-mode .prac-btn-secondary { padding: 10px; font-size: 14px; }
body.prac-video-mode .practice-controls { padding-top: 10px; gap: 8px; }
body.prac-video-mode .prac-timer-label { font-size: 12px; }
.prac-video-hero {
  width: 100%; max-width: 480px;
  margin: 0 auto;
  border-radius: 16px; overflow: hidden;
  background: #000;
  border: 1px solid var(--line2);
  flex-shrink: 0;
  min-height: 120px;
}
.prac-video-hero video {
  width: 100%; height: auto;
  max-height: min(36vh, 340px);
  object-fit: contain; display: block;
  background: #000;
}
.prac-video-hero iframe {
  width: 100%; height: 100%;
  display: block; background: #000; border: none;
}
/* Fullscreen toggle in the practice header */
.prac-fs-btn {
  font-size: 18px; color: var(--txt2); cursor: pointer;
  padding: 4px 10px; background: none; border: 1px solid var(--line2);
  border-radius: 8px; line-height: 1; font-family: 'DM Sans', sans-serif;
}
.prac-mini-timer {
  display: flex; align-items: center; justify-content: center;
  gap: 12px;
}
.prac-mini-timer .prac-ring-svg { transform: rotate(-90deg); flex-shrink: 0; }
.prac-mini-time {
  font-family: 'DM Serif Display', serif;
  font-size: 30px; color: var(--txt); line-height: 1;
}
.prac-mini-unit { font-size: 12px; color: var(--txt3); margin-top: 2px; }

.prac-ex-name {
  font-family: 'DM Serif Display', serif;
  font-size: 28px; color: var(--txt);
  text-align: center; line-height: 1.2;
}
.prac-ex-mod {
  font-size: 14px; color: var(--accent); text-align: center;
}
.prac-cues {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center;
}
.prac-cue {
  background: var(--bg3); border: 1px solid var(--line2);
  border-radius: 100px; padding: 5px 14px;
  font-size: 13px; color: var(--txt2);
}

.prac-step-pills {
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
}
.prac-pill {
  width: 28px; height: 6px; border-radius: 3px;
  background: var(--bg4); transition: background .3s;
}
.prac-pill.done { background: var(--accent2); }
.prac-pill.active { background: var(--accent); }

/* Bottom controls */
.practice-controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 16px 24px calc(var(--safe-bottom) + 16px);
  background: linear-gradient(to top, var(--bg) 80%, transparent);
  display: flex; flex-direction: column; gap: 10px;
  z-index: 10;
}
.prac-btn-primary {
  width: 100%; padding: 18px;
  background: var(--accent2); color: var(--bg);
  border: none; border-radius: var(--r);
  font-family: 'DM Serif Display', serif;
  font-size: 20px; cursor: pointer;
  transition: opacity .15s, transform .1s;
  -webkit-user-select: none;
}
.prac-btn-primary:active { opacity: .85; transform: scale(.98); }
.prac-btn-primary:disabled { opacity: .35; cursor: not-allowed; transform: none; }
.prac-btn-secondary {
  width: 100%; padding: 12px;
  background: transparent; color: var(--txt3);
  border: 1px solid var(--line2); border-radius: var(--r);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; cursor: pointer;
  transition: color .15s, border-color .15s;
}
.prac-btn-secondary:active { color: var(--txt); border-color: var(--line3); }
.prac-timer-label {

/* Done screen */

}

}
.prac-done-title {

}

.prac-done-stats {

  border-radius: var(--r-lg); padding: 18px 24px;

}

/* ── ARTICLE READER SCREEN ── */
#screen-article {

}
.article-hd {

/* Warning callout — for red flags / call-the-office content */
.art-warning {

}
.art-warning-label {
  font-size: 10px;
  color: var(--danger);

  margin: 0;

/* Timeline — labeled rows for chronological content */
.art-timeline {

.art-timeline-row {

}
.art-timeline-row:last-child { border-bottom: none; }

  font-size: 15px;

}
.art-timeline-what {
  flex: 1;
  font-size: 15px;
  color: var(--txt);
  line-height: 1.5;

/* Decision cards (three-tier triage: green/gold/red) */
.art-decision-stack {
  display: flex; flex-direction: column;
  gap: 12px; margin: 22px 0;
}
.art-decision-card {
  border: 1px solid var(--line);
  border-left: 4px solid var(--txt3);
  border-radius: 12px;

}
.art-decision-card.green {
  background: rgba(143,175,148,.06);

}
.art-decision-card.gold {
  background: rgba(200,184,154,.06);

  border-color: rgba(196,122,122,.25);

}
.art-decision-tier {

}
.art-decision-card.green .art-decision-tier {
  color: var(--accent2);

}
.art-decision-card.gold .art-decision-tier {
  color: var(--accent);
  background: rgba(200,184,154,.20);
}
.art-decision-card.red .art-decision-tier {
  color: var(--danger);
  background: rgba(196,122,122,.15);
}
.art-decision-title {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--txt);
  line-height: 1.25;
}
.art-decision-body {
  font-size: 14px;
  color: var(--txt);
  line-height: 1.55;

}
.art-decision-body ul {
  margin: 6px 0 0 0;
  padding: 0 0 0 18px;
}
.art-decision-body li { margin-bottom: 4px; }

/* 911 banner — heaviest visual emphasis */

  padding: 16px 18px;

  margin: 22px 0;
}
.art-banner-911-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: 0.85;
}
.art-banner-911-body {
  font-size: 15px;
  line-height: 1.5;
  margin: 0;
  color: #FFFFFF;
}
.art-banner-911-body strong { color: #FFFFFF; }

/* History note — softer, cream-tinted box for historical/philosophical asides */
.art-history-note {
  background: rgba(200,184,154,.05);
  border: 1px solid rgba(200,184,154,.20);
  padding: 14px 16px;
  margin: 22px 0;
  border-radius: 10px;
  font-size: 14px;
  color: var(--txt2);
  line-height: 1.55;
}
.art-history-note-label {
  font-size: 10px;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* Region table — labeled rows for anatomical / categorical content */
.art-region-table {
  margin: 18px 0;
}
.art-region-row {
  display: flex;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
  align-items: flex-start;
}
.art-region-row:last-child { border-bottom: none; }
.art-region-label {
  flex-shrink: 0;
  width: 100px;
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  color: var(--accent2);
  line-height: 1.2;
}
.art-region-label-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--txt3);
  margin-top: 3px;
  font-weight: 400;
}
.art-region-body {
  flex: 1;
  font-size: 14px;
  color: var(--txt);
  line-height: 1.55;
}

/* Figure with diagram */
.art-figure {
  margin: 22px 0;
}
.art-figure svg {
  display: block;
  width: 100%;
  height: auto;
}
.art-figcaption {
  font-size: 12px;
  color: var(--txt3);
  margin-top: 10px;
  text-align: center;
  line-height: 1.5;
  font-style: italic;
}

/* Stacked compare cards (mobile) */
.art-compare {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 22px 0;
}
.art-compare-col {
  padding: 14px 16px;
  border-radius: 10px;

}
.art-compare-col.bad {

}
.art-compare-col.good {
  background: rgba(143,175,148,.06);
  border-color: rgba(143,175,148,.25);
}
.art-compare-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;

}
.art-compare-col.bad .art-compare-label { color: var(--danger); }
.art-compare-col.good .art-compare-label { color: var(--accent2); }
.art-compare-body {
  font-size: 14px;
  line-height: 1.55;
  color: var(--txt);
  margin: 0;
}

.art-end-mark {
  text-align: center;
  font-family: 'DM Serif Display', serif;
  font-size: 22px;

.msg-unread-dot {

}

  margin-top: 10px;

  border-radius: var(--r-sm);
  padding: 10px 12px;
}
.msg-slots-lbl {
  font-size: 10px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--accent2);

}

  display: inline-flex; align-items: center; gap: 5px;

  font-family: 'DM Sans', sans-serif;

  transition: opacity .12s;
  -webkit-user-select: none;
}
.msg-compose-send:active { opacity: .8; }

// ── SUPABASE FETCH ──────────────────────────────────────────────
async function sbFetch(path, opts={}){
  const method = opts.method||'GET';
  const res = await fetch(SB_URL+'/rest/v1/'+path, {
    headers:{
      'apikey': SB_KEY,
      'Authorization': 'Bearer '+SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='GET'?'return=representation':'return=minimal',
      ...opts.headers
    },
    method,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if(!res.ok) throw new Error('DB '+res.status);
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

// ── EXERCISE MEDIA (videos) ─────────────────────────────────────
// Video links are saved by the admin into the shared exercise_overrides
// table. We load them here (keyed by exercise id) so the patient sees the
// same demo videos in their home-practice runner. Built-in exercises use
// "__url__<id>"; custom exercises store a JSON blob under "__custom__<id>".
let _exMedia = {}; // { exerciseId: { videoUrl, ytId } }
function _setMedia(id, patch){ _exMedia[id] = Object.assign({}, _exMedia[id], patch); }
async function loadExerciseMedia(){
  try{
    const rows = await sbFetch('exercise_overrides?select=key,value');
    if(!Array.isArray(rows)) return _exMedia;
    rows.forEach(r=>{
      if(!r || r.key==null) return;
      const k = r.key;
      if(k.indexOf('__url__')===0){
        _setMedia(k.slice(7), { videoUrl: r.value });
      } else if(k.indexOf('__custom__')===0){
        try{ const o = JSON.parse(r.value); if(o && o.id){ _setMedia(o.id, { videoUrl: o.videoUrl||'', ytId: o.ytId||'' }); } }catch(e){}
      } else if(k.indexOf('__')!==0){
        _setMedia(k, { ytId: r.value }); // legacy YouTube id for a built-in
      }
    });
  }catch(e){ console.warn('exercise media load failed', e); }
  return _exMedia;
}
function exMediaFor(step){
  const id = step && (step.exercise_id || step.ex);
  return (id && _exMedia[id]) ? _exMedia[id] : null;
}

function updateDots(mode=''){
  for(let i=0;i<4;i++){

    else if(i<pinInput.length) d.classList.add('filled');
  }
}
async function submitPin(){
  try{

// ── HELPERS ──────────────────────────────────────────────────────
function fmt(iso){ const d=new Date(iso); return d.toLocaleDateString([],{month:'short',day:'numeric'}); }
function fmtFull(iso){ const d=new Date(iso); return d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'}); }
function fmtTime(s){ const m=Math.floor(s/60),sec=s%60; return m>0?m+'m'+(sec?' '+sec+'s':''):sec+'s'; }
function calcStreak(){
  const days=new Set(sessions.map(s=>s.completed_at.slice(0,10)));
  let streak=0, d=new Date();
  while(days.has(d.toISOString().slice(0,10))){ streak++; d.setDate(d.getDate()-1); }
  if(streak===0){ d=new Date(); d.setDate(d.getDate()-1); while(days.has(d.toISOString().slice(0,10))){ streak++; d.setDate(d.getDate()-1); } }
  return streak;
}
function complianceData(days){
  const since=new Date(); since.setDate(since.getDate()-days);
  const count=sessions.filter(s=>new Date(s.completed_at)>=since).length;
  const target=Math.round(days/7*3);
  return {count,target,pct:Math.min(100,Math.round(count/Math.max(1,target)*100))};
}
function compRingSVG(pct,color,size=60){
  const r=size/2-5,circ=2*Math.PI*r,offset=circ*(1-pct/100);
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--bg4)" stroke-width="5"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" stroke-linecap="round"/>
  </svg>`;
}

// other ID-shaped string). These leak in when the admin saved a protocol step

// them in the patient-facing view so the patient never sees "custom_177668...".
function isLikelyExerciseId(s){
  if(!s) return true;
  return /^custom_\d+$/i.test(s) || /^[a-z0-9_]{12,}$/i.test(s) && !/\s/.test(s);
}
function renderProtocol(){

  const visibleProto = proto.filter(s => {

// ── HISTORY TAB ──────────────────────────────────────────────────
function renderJourney(){
  const panel = document.getElementById('panel-journey');
  if(!panel) return;

  if(sessions.length===0){
    panel.innerHTML=`
      <div class="empty-state" style="margin-top:40px;">
        <div class="empty-icon">◷</div>
        <div class="empty-title">Your journey starts here</div>
        <div class="empty-sub">Your activity, streaks, and session history will appear here after your first activation.</div>
      </div>`;
    return;
  }

  const streak = calcStreak();
  const sessionDays = new Set(sessions.map(s=>s.completed_at.slice(0,10)));

  // 14-day activity sparkline — count exercises per day (visual interest scales with effort)
  const today = new Date().toISOString().slice(0,10);
  const days14 = [];
  for(let i=13;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    const sessForDay = sessions.filter(s=>s.completed_at.slice(0,10)===key);
    const count = sessForDay.reduce((a,s)=>a+(s.steps||0),0);
    days14.push({key, count, isToday: key===today});
  }
  const maxCount = Math.max(1, ...days14.map(d=>d.count));
  const barsHtml = days14.map(d=>{
    const pct = d.count>0 ? Math.max(12, (d.count/maxCount)*100) : 0;
    const cls = d.isToday ? 'today' : (d.count>0 ? 'active' : '');
    return `<div class="spark-bar ${cls}" style="height:${pct}%;" title="${d.key}: ${d.count} exercises"></div>`;
  }).join('');

    <div class="section-hd">Current streak</div>

      </div>
      <div class="j-stat">

      </div>

    <div style="height:10px;"></div>`;

        <p>Joints are like that hinge. Muscles that surround them are like that hinge too. The adjustment frees the joint. Movement keeps it free. And the kind of movement that does this best is not <em>any</em> movement — it is the specific exercises a chiropractor prescribes for a specific person's pattern of stuckness.</p>

          </ul>
        </div>

        <p>None of these things mean something is broken. They mean the doctor wants to take another look and adjust the plan. That is a normal part of care, not a failure of it.</p>

        <div class="art-pullquote">Soreness that feels like a workout is normal. Pain that feels sharp, electric, or wrong is not. Nobody is ever annoyed by a patient calling to ask.</div>

        <h2 class="art-h2"><span class="art-h2-num">05</span>What if nothing happens at all</h2>

        <p>About one in four patients walks out of an adjustment feeling… roughly the same. No dramatic relief. No soreness. Just normal. They sometimes wonder if it worked.</p>

        <p>It probably did. A lot of the work an adjustment does is invisible in the moment — restoring motion to a joint, easing tension in the surrounding muscles, sending a quiet update to the nervous system. The body does not always announce these changes. Especially in patients who have been in care for a while, the visit feels routine because that is what consistent care looks like. The dramatic responses tend to come at the beginning, when there is more to undo.</p>

        <p>The honest test is not how the next twenty minutes feel. It is how the body moves over the next few weeks.</p>

        <h2 class="art-h2"><span class="art-h2-num">06</span>The bottom line</h2>

        <p>Most reactions to an adjustment are mild, short-lived, and a sign the body is integrating something new. A small handful are worth calling about. The list above covers the ones that matter.</p>

        <p>Drink water. Move a little. Sleep. Do the home practice. And if anything feels sharp, electric, or unlike normal soreness — pick up the phone. That is what the office is there for.</p>

        <div class="art-end-mark">· · ·</div>

        <div class="art-footer">
          <strong>About this guide.</strong> This is general patient education and is not medical advice for any specific person. Reactions to chiropractic care vary, and any concerns about a specific symptom should go directly to the treating chiropractor or a relevant medical provider. If symptoms feel like a medical emergency, call 911 or go to the nearest emergency department.
        </div>
      </div>
    `
  },

  'when-to-call': {
    title: 'When to call us vs wait it out',
    headTitle: 'Start here',
    body: `
      <div class="art-kicker">Start Here</div>
      <h1 class="art-h1">When to call us, wait it out, or skip us entirely.</h1>
      <p class="art-deck">Bodies do strange things sometimes. This is a short, honest guide for figuring out which bucket a new symptom falls into — without spiraling at 11pm.</p>
      <div class="art-byline">A short read · About 5 minutes · <strong>Save this — it's the one to keep handy</strong></div>

      <div class="art-body">
        <p class="art-lede">Most aches and pains do not need a phone call. Most do not need an emergency room either. The trick is knowing the few that genuinely do, and not losing sleep over the rest.</p>

        <p>Here is the framework. It fits on one screen. The rest of this guide just unpacks it.</p>

        <figure class="art-figure">
          <svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three-bucket triage diagram showing wait, call, and 911 categories">
            <g transform="translate(20, 30)">
              <rect x="0" y="0" width="160" height="120" rx="10" fill="rgba(143,175,148,.10)" stroke="#8FAF94" stroke-width="2"/>
              <circle cx="80" cy="42" r="18" fill="rgba(143,175,148,.22)" stroke="#8FAF94" stroke-width="1.5"/>
              <text x="80" y="50" text-anchor="middle" font-family="DM Serif Display, serif" font-size="22" fill="#8FAF94">~</text>
              <text x="80" y="84" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#8FAF94" letter-spacing="0.08em">WAIT IT OUT</text>
              <text x="80" y="100" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">soreness, mild ache,</text>
              <text x="80" y="112" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">stiffness — give it 48 hrs</text>
            </g>
            <g transform="translate(220, 30)">
              <rect x="0" y="0" width="160" height="120" rx="10" fill="rgba(200,184,154,.10)" stroke="#C8B89A" stroke-width="2"/>
              <circle cx="80" cy="42" r="18" fill="rgba(200,184,154,.22)" stroke="#C8B89A" stroke-width="1.5"/>
              <path d="M 73 35 L 87 35 L 87 49 L 80 53 L 73 49 Z" fill="#C8B89A"/>
              <text x="80" y="84" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C8B89A" letter-spacing="0.08em">CALL US</text>
              <text x="80" y="100" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">sharp, lingering, or new</text>
              <text x="80" y="112" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">symptoms after 24 hrs</text>
            </g>
            <g transform="translate(420, 30)">
              <rect x="0" y="0" width="160" height="120" rx="10" fill="rgba(196,122,122,.10)" stroke="#C47A7A" stroke-width="2"/>
              <circle cx="80" cy="42" r="18" fill="#C47A7A"/>
              <text x="80" y="48" text-anchor="middle" font-family="DM Sans" font-size="13" font-weight="700" fill="#FFFFFF">911</text>
              <text x="80" y="84" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C47A7A" letter-spacing="0.08em">EMERGENCY</text>
              <text x="80" y="100" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">stroke signs, severe</text>
              <text x="80" y="112" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">trauma, can't breathe</text>
            </g>
          </svg>
          <div class="art-figcaption">Three buckets. Most symptoms land in the first one. A handful land in the second. A small number need bucket three.</div>
        </figure>

        <h2 class="art-h2"><span class="art-h2-num">01</span>Bucket one: probably wait it out</h2>

        <div class="art-decision-stack">
          <div class="art-decision-card green">
            <div class="art-decision-head">
              <span class="art-decision-tier">Wait it out</span>
              <div class="art-decision-title">Mild aches and "I just got adjusted" feelings</div>
            </div>
            <p class="art-decision-body">Most after-care reactions belong here. Things to expect and not worry about:</p>
            <ul class="art-decision-body">
              <li>Soreness similar to the day after a workout, rated 1 to 4 out of 10</li>
              <li>Mild stiffness on first standing in the morning that loosens with movement</li>
              <li>Feeling tired, hungry, or unusually sleepy the evening of an adjustment</li>
              <li>A familiar ache in an area that has flared before, behaving the same as before</li>
              <li>Joint pops or clicks that are not painful</li>
            </ul>
          </div>
        </div>

        <p>The rule of thumb for bucket one is the <strong>48-hour rule</strong>. If a symptom is mild, familiar, and improving — even slowly — over 48 hours, it is probably running its course. Heat, hydration, gentle movement, and sleep are the boring tools that quietly handle most of these.</p>

        <p>Bucket one is also where home practice does most of its work. The exercises a chiropractor prescribes are designed for exactly these kinds of normal recoveries.</p>

        <h2 class="art-h2"><span class="art-h2-num">02</span>Bucket two: pick up the phone</h2>

        <div class="art-decision-stack">
          <div class="art-decision-card gold">
            <div class="art-decision-head">
              <span class="art-decision-tier">Call us</span>
              <div class="art-decision-title">When something has changed and is not settling</div>
            </div>
            <p class="art-decision-body">A phone call to the office is the right move when:</p>
            <ul class="art-decision-body">
              <li>Pain is sharper, more constant, or in a new place since the last visit</li>
              <li>Soreness has not improved at all after 48 hours, or it is getting worse</li>
              <li>A specific exercise causes pain that does not fade after stopping</li>
              <li>Numbness or tingling shows up in an arm or leg</li>
              <li>Headaches start happening more often or feel different from usual</li>
              <li>A new injury occurred between visits — fall, car accident, awkward lift</li>
              <li>Pain is bad enough to wake up from sleep</li>
              <li>Any concern that just keeps rattling around in the head — that one counts too</li>
            </ul>
          </div>
        </div>

        <p>Front desk staff are not annoyed by these calls. They are useful calls. They give the doctor a chance to adjust the plan — sometimes by changing the protocol, sometimes by having the patient come in early, sometimes by referring out to someone better suited to the issue. None of those decisions can be made if the patient does not call.</p>

        <div class="art-pullquote">A two-minute phone call has saved more recoveries than any single adjustment. Most of what gets fixed in chiropractic happens because the patient said something.</div>

        <h2 class="art-h2"><span class="art-h2-num">03</span>Bucket three: skip the office, call 911</h2>

        <p>Some symptoms are not chiropractic problems at all. They are medical emergencies that need an ambulance, a hospital, or both. The list below is short on purpose. Memorizing it is one of the few things that genuinely matters.</p>

        <div class="art-banner-911">
          <div class="art-banner-911-label">Call 911 or go to the ER for</div>
          <p class="art-banner-911-body"><strong>FAST signs of stroke:</strong> Face drooping on one side · Arm weakness when raised · Speech slurred or strange · Time to call right away. Also: sudden severe headache unlike any before, sudden vision loss, severe chest pain or trouble breathing, loss of bladder or bowel control, weakness or numbness in both legs at once, or any major trauma.</p>
        </div>

        <p>None of these are subtle. If something on that list is happening, it is happening loudly. Trust the gut feeling that says <em>this is different.</em> An ER visit that turns out to be nothing is a great outcome. The other direction is not.</p>

        <h2 class="art-h2"><span class="art-h2-num">04</span>The "I do not know which bucket this is" problem</h2>

        <p>This is the most honest situation of all. A symptom is uncomfortable but not dramatic. It might be normal soreness, or it might be something else, and there is no clean way to tell from the inside.</p>

        <p>The default answer is to call the office. Phone triage is what it is for. A two-minute conversation usually clarifies the bucket, and clarifying the bucket is most of the work.</p>

        <p>The exception is when something on the bucket-three list is happening. In that case, do not call the office first — call 911 or get to an ER. The chiropractor will get the records later. Speed matters more than continuity in those moments.</p>

        <div class="art-callout">
          <div class="art-callout-label">A useful rule</div>
          <p class="art-callout-body">When in doubt and not sure: call the office. When in doubt <em>and</em> something feels seriously wrong: call 911. The cost of a wrong guess in the calm direction is much higher than in the cautious direction.</p>
        </div>

        <h2 class="art-h2"><span class="art-h2-num">05</span>The bottom line</h2>

        <p>Three buckets. Most things go in the first. A handful go in the second. A small number — and they tend to be obvious — go in the third.</p>

        <p>The 48-hour rule covers most of bucket one. A phone call covers all of bucket two. 911 covers bucket three. That is the whole framework. Patients who internalize this end up calmer in the moment <em>and</em> faster to act when speed actually matters — which is what good triage is supposed to do.</p>

        <div class="art-end-mark">· · ·</div>

        <div class="art-footer">
          <strong>About this guide.</strong> This is general patient education and is not medical advice for any specific person. The lists above are common examples, not a complete inventory. Anyone uncertain about a symptom should err on the side of calling — the office in non-urgent situations, or 911 / the nearest emergency department in urgent ones. <strong>If a symptom feels like a medical emergency, do not wait to read this — call 911.</strong>
        </div>
      </div>
    `
  },

  'nervous-system': {
    title: 'The nervous system and your spine',
    headTitle: 'Understanding chiropractic',
    body: `
      <div class="art-kicker">Understanding Chiropractic</div>
      <h1 class="art-h1">The nervous system and your spine.</h1>
      <p class="art-deck">A short tour of why chiropractors care so much about a stack of bones — and what is actually moving through it.</p>
      <div class="art-byline">A short read · About 5 minutes · <strong>For curious patients</strong></div>

      <div class="art-body">
        <p class="art-lede">Most people picture the spine as the body's main support beam. That is true. It is the pole that keeps everything upright. But that is also the boring half of the story. The interesting half is what is running through the middle of it.</p>

        <p>Inside the spine, threaded through the bones like cable through a stack of donuts, is the spinal cord. The spinal cord is essentially an extension of the brain. Every signal from the brain to the body, and almost every signal from the body back to the brain, has to travel through it. The spine is housing for the most important communication line in the body.</p>

        <p>That fact is the reason chiropractors care so much about how the spine moves.</p>

        <h2 class="art-h2"><span class="art-h2-num">01</span>What the spinal cord actually does</h2>

        <p>The spinal cord is about 18 inches long in an adult. It runs from the base of the skull down to roughly the middle of the lower back, where it splits into a bundle of nerve roots that look a bit like a horse's tail. (The Latin name for that bundle, <em>cauda equina</em>, literally means "horse's tail." Anatomists were not always subtle.)</p>

        <p>Along the way, 31 pairs of nerves branch off and exit between the bones. Each pair handles a specific region of the body — sensation in, motor commands out. The signals travel constantly, in both directions, at speeds up to 270 miles per hour. The whole system is humming along quietly even while a person is sitting still and reading something like this.</p>

        <figure class="art-figure">
          <svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diagram of the spine showing the spinal cord and nerve roots branching out at each vertebral level">
            <g transform="translate(80, 30)">
              <g fill="rgba(200,184,154,.18)" stroke="#C8B89A" stroke-width="1.5">
                <rect x="20" y="0" width="40" height="22" rx="3"/>
                <rect x="20" y="26" width="40" height="22" rx="3"/>
                <rect x="20" y="52" width="40" height="22" rx="3"/>
                <rect x="20" y="78" width="40" height="22" rx="3"/>
                <rect x="20" y="104" width="40" height="22" rx="3"/>
                <rect x="20" y="130" width="40" height="22" rx="3"/>
                <rect x="20" y="156" width="40" height="22" rx="3"/>
                <rect x="20" y="182" width="40" height="22" rx="3"/>
                <rect x="20" y="208" width="40" height="22" rx="3"/>
              </g>
              <line x1="40" y1="-2" x2="40" y2="232" stroke="#8FAF94" stroke-width="3" opacity="0.6"/>
              <line x1="40" y1="-2" x2="40" y2="232" stroke="#8FAF94" stroke-width="1.5" stroke-dasharray="2,3"/>
              <g stroke="#8FAF94" stroke-width="1.5" fill="none" opacity="0.85">
                <path d="M 60 11 Q 80 11 95 14"/>
                <path d="M 60 37 Q 80 37 95 40"/>
                <path d="M 60 63 Q 80 63 95 66"/>
                <path d="M 60 89 Q 85 89 105 92"/>
                <path d="M 60 115 Q 85 115 105 118"/>
                <path d="M 60 141 Q 90 141 115 144"/>
                <path d="M 60 167 Q 90 167 115 170"/>
                <path d="M 60 193 Q 95 193 125 196"/>
                <path d="M 60 219 Q 95 219 125 222"/>
              </g>
              <g stroke="#8FAF94" stroke-width="1.5" fill="none" opacity="0.85">
                <path d="M 20 11 Q 0 11 -15 14"/>
                <path d="M 20 37 Q 0 37 -15 40"/>
                <path d="M 20 63 Q 0 63 -15 66"/>
                <path d="M 20 89 Q -5 89 -25 92"/>
                <path d="M 20 115 Q -5 115 -25 118"/>
                <path d="M 20 141 Q -10 141 -35 144"/>
                <path d="M 20 167 Q -10 167 -35 170"/>
                <path d="M 20 193 Q -15 193 -45 196"/>
                <path d="M 20 219 Q -15 219 -45 222"/>
              </g>
            </g>
            <g font-family="DM Sans" font-size="10" fill="#9CA0A6">
              <line x1="220" y1="40" x2="160" y2="44" stroke="#6B7079" stroke-width="0.8" opacity="0.5"/>
              <text x="225" y="38" font-weight="700" fill="#C8B89A">Vertebra</text>
              <text x="225" y="52" fill="#9CA0A6">Bone segment</text>
              <line x1="220" y1="100" x2="125" y2="124" stroke="#6B7079" stroke-width="0.8" opacity="0.5"/>
              <text x="225" y="98" font-weight="700" fill="#8FAF94">Spinal cord</text>
              <text x="225" y="112" fill="#9CA0A6">Communication line</text>
              <line x1="220" y1="170" x2="155" y2="170" stroke="#6B7079" stroke-width="0.8" opacity="0.5"/>
              <text x="225" y="168" font-weight="700" fill="#8FAF94">Nerve roots</text>
              <text x="225" y="182" fill="#9CA0A6">31 pairs branching out</text>
              <line x1="220" y1="240" x2="170" y2="246" stroke="#6B7079" stroke-width="0.8" opacity="0.5"/>
              <text x="225" y="238" font-weight="700" fill="#C8B89A">To the body</text>
              <text x="225" y="252" fill="#9CA0A6">Arms, legs, organs, skin</text>
            </g>
          </svg>
          <div class="art-figcaption">The spine houses the spinal cord. Nerves branch out between vertebrae to reach the rest of the body. This is the basic layout of the system.</div>
        </figure>

        <h2 class="art-h2"><span class="art-h2-num">02</span>Why movement is part of the conversation</h2>

        <p>Here is the part that often surprises people. The nervous system is not just a one-way messenger from the brain to the muscles. A huge amount of traffic flows the <em>other</em> direction — from joints, muscles, and tendons back up to the brain.</p>

        <p>Every joint in the spine is packed with tiny sensors. They report back constantly: "I am bent this much. The tension here is this. Pressure feels like that." This stream of information is called <strong>proprioception</strong> — basically, the body's sense of itself. It is how a person can close their eyes and still touch their nose.</p>

        <p>When a spinal joint stops moving the way it should — stuck, restricted, irritated — those sensors stop sending clear signals. The brain starts working with worse information. That can show up as tight muscles, achy regions, headaches, even balance and coordination changes that nobody connects to the spine because they do not feel like spine problems.</p>

        <div class="art-callout">
          <div class="art-callout-label">In Plain Terms</div>
          <p class="art-callout-body">When a joint moves well, it sends clear signals to the brain. When it does not, the brain works with bad data — and the body shows it.</p>
        </div>

        <h2 class="art-h2"><span class="art-h2-num">03</span>What an adjustment is doing, in nervous-system terms</h2>

        <p>An adjustment is a quick, specific input to a joint that has stopped moving correctly. The mechanical effect is restoring motion. The nervous system effect is more interesting: the input wakes up those sensors. Fresh, clear signals start flowing again. The brain gets an update on what is actually happening down there.</p>

        <p>This is the modern way of describing what chiropractors have always observed. A patient gets adjusted, and within minutes things change that have nothing to do with the joint that was treated. Muscles relax in a different region. Headaches ease. Breathing feels deeper. Older models of chiropractic explained this with concepts like "innate intelligence" flowing through the nerves. Newer research describes it through proprioception, motor control, and how the nervous system organizes itself.</p>

        <p>Both descriptions are pointing at the same thing. The spine is mechanical, but the changes that happen after an adjustment are largely neurological.</p>

        <div class="art-history-note">
          <div class="art-history-note-label">A note on history</div>
          Chiropractic was founded in 1895 by D.D. Palmer, who treated a janitor's hearing loss after adjusting his upper back. The story is part history, part profession-defining myth, and part puzzle that took a hundred years of neuroscience to start explaining. Today, researchers in proprioception, central sensitization, and motor control have given the profession's old observations a more precise vocabulary — without erasing what came before.
        </div>

        <h2 class="art-h2"><span class="art-h2-num">04</span>What each region tends to be involved in</h2>

        <p>The spine is organized into regions, and the nerves that exit each region tend to handle predictable parts of the body. None of this is destiny — bodies are complicated and signals overlap — but it is a useful map.</p>

        <div class="art-region-table">
          <div class="art-region-row">
            <div class="art-region-label">Cervical
              <div class="art-region-label-sub">7 bones, neck</div>
            </div>
            <div class="art-region-body">Nerves exiting the upper spine influence the head, face, arms, and hands. Restrictions here often show up as headaches, neck tension, jaw discomfort, or tingling down the arms.</div>
          </div>
          <div class="art-region-row">
            <div class="art-region-label">Thoracic
              <div class="art-region-label-sub">12 bones, mid-back</div>
            </div>
            <div class="art-region-body">The mid-back nerves serve the chest wall, ribs, and many internal organs. People often notice this region as upper-back tightness or a band of tension between the shoulder blades.</div>
          </div>
          <div class="art-region-row">
            <div class="art-region-label">Lumbar
              <div class="art-region-label-sub">5 bones, lower back</div>
            </div>
            <div class="art-region-body">Lower-back nerves run to the legs and pelvis. This is the region most associated with sciatica, lower-back stiffness, and hip-related issues.</div>
          </div>
          <div class="art-region-row">
            <div class="art-region-label">Sacral
              <div class="art-region-label-sub">Pelvis base</div>
            </div>
            <div class="art-region-body">The sacrum and the joints around it influence the pelvic floor, bladder, and the way force travels from the legs into the spine. SI joint dysfunction lives here.</div>
          </div>
        </div>

        <div class="art-pullquote">The spine is a stack of bones. The nervous system is a story those bones tell to the brain — every minute, all day long.</div>

        <h2 class="art-h2"><span class="art-h2-num">05</span>The bottom line</h2>

        <p>The spine is not just a support beam. It is the housing for the body's main communication line, and the joints between every pair of vertebrae are constantly reporting upward to the brain. When those joints move well, the reports are clear. When they do not, the reports are noisy — and the body finds creative ways to show it.</p>

        <p>A chiropractic adjustment is a small mechanical input with a much larger nervous-system effect. That is the part that is hard to feel in the moment but easy to notice over weeks. Care that focuses on motion is, in a real sense, care that focuses on the conversation between the body and the brain.</p>

        <div class="art-end-mark">· · ·</div>

        <div class="art-footer">
          <strong>About this guide.</strong> This is general patient education and is not medical advice for any specific person. The relationships between spinal regions and body systems described above are typical patterns, not guarantees — every patient is different, and any concerns about specific symptoms should go to the treating chiropractor or another medical provider.
        </div>
      </div>
    `
  },

  'lower-back': {
    title: 'Understanding lower back pain',
    headTitle: 'Your condition',
    body: `
      <div class="art-kicker">Your Condition</div>
      <h1 class="art-h1">What is actually going on in your lower back.</h1>
      <p class="art-deck">An honest look at why lower back pain happens, why it is almost never as bad as it feels, and what actually moves the needle.</p>
      <div class="art-byline">A short read · About 4 minutes · <strong>For anyone with a back that does not feel right</strong></div>

      <div class="art-body">
        <p class="art-lede">It is 11pm. Something tweaked in the lower back earlier today, and now Google is involved. The search history goes: lower back pain → causes → bulging disc → degenerative disc disease → sciatica → spinal fusion. By the time the lights go off, the body has been mentally upgraded to a code-red structural disaster.</p>

        <p>Most of that is not what is happening.</p>

        <h2 class="art-h2"><span class="art-h2-num">01</span>Almost everyone has been here</h2>

        <p>Roughly four out of five adults will deal with significant lower back pain at some point in their lives. It is the second most common reason people see a doctor, right after the common cold. If lower back pain were a sign that something serious was wrong, the species would have died out a long time ago.</p>

        <p>What it actually is, in the overwhelming majority of cases, is a <em>mechanical</em> issue. A joint that stopped moving the way it should. A muscle that has been clenched for two weeks straight without being told to relax. A small irritation in a region that has more moving parts than most people realize. None of these are emergencies. All of them respond to care.</p>

        <p>This article is about the 95% of lower back pain that is mechanical. The remaining 5% — the part that warrants a different conversation — is covered at the end.</p>

        <h2 class="art-h2"><span class="art-h2-num">02</span>What is actually down there</h2>

        <p>The lower back is doing a lot of jobs at once. Five large vertebrae stack to support the upper body. Between each pair is a disc that absorbs load and lets the spine move. Behind those discs, on either side of the spine, sit small joints called facet joints — about the size of a fingernail — that guide motion. Layered on top of all of that are deep stabilizing muscles, larger movement muscles, and a web of nerves that runs from the spine out into the legs.</p>

        <p>When lower back pain shows up, it is almost always one of three things:</p>

        <figure class="art-figure">
          <svg viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three illustrations: a stuck joint, a tight muscle, and an irritated nerve">
            <g transform="translate(35, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(200,184,154,.08)" stroke="#C8B89A" stroke-width="1.5"/>
              <rect x="40" y="30" width="60" height="24" rx="4" fill="rgba(200,184,154,.25)" stroke="#C8B89A" stroke-width="1.5"/>
              <rect x="40" y="66" width="60" height="24" rx="4" fill="rgba(196,122,122,.30)" stroke="#C47A7A" stroke-width="2"/>

            </g>
            <g transform="translate(225, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(200,184,154,.08)" stroke="#C8B89A" stroke-width="1.5"/>

              <path d="M 30 80 Q 50 55, 70 80 Q 90 105, 110 80" fill="none" stroke="#C8B89A" stroke-width="3" opacity="0.7"/>
              <path d="M 30 85 Q 50 60, 70 85 Q 90 110, 110 85" fill="none" stroke="#C8B89A" stroke-width="3"/>

            </g>
