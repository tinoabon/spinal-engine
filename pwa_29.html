        <p>Here is the part that explains everything else.</p>

        <p>Gravity is constant. It is gentle. A single minute of being still under gravity does nothing measurable to the body. An hour does very little. Six hours, every day, for years, does a great deal.</p>

        <p>Think of it like compound interest. The discs get a little more compressed. The joints get a little stiffer. The muscles get a little tighter. The fascia gets a little less mobile. None of it would matter on its own. All of it accumulates. By forty, the body that has been static for two decades is operating with measurably less mobility, more pain, and a much narrower range of comfortable positions than the body that has been moving.</p>

        <p>This is what desk work actually does to a body. It is not the chair. It is not the screen angle. It is the time. The body was built to fight gravity through active movement, not to surrender to it through six-hour sitting blocks.</p>

        <h2 class="art-h2"><span class="art-h2-num">05</span>The protocol that actually works</h2>

        <p>This is the entire desk-work prescription, simplified to what matters.</p>

        <p><strong>Every thirty minutes, get up.</strong> One to two minutes. Walk somewhere. Stretch. Stand. Sit back down in a different position. Repeat all day. Set a timer for the first week if you have to.</p>

        <p><strong>Sit however you want.</strong> Cross-legged on the chair. Slumped against the back. Leaned forward. Standing at the desk. Reclined. All of these are fine for short stretches. None of them are fine for hours.</p>

        <p><strong>Get the screen to eye level.</strong> The only ergonomic non-negotiable.</p>

        <p><strong>Build strength.</strong> A body with strong shoulders, hips, and a strong core can handle a much wider range of positions without complaint. The exercises prescribed in this app are picked partly to give you the strength reserve that lets your body sit any way it wants without paying for it later.</p>

        <p><strong>Skip the gear.</strong> The most expensive ergonomic chair on the market does not solve the problem of being sat in for eight hours straight. A folding chair, used by someone who gets up every thirty minutes, is healthier than the best chair money can buy used by someone who does not move all day.</p>

        <p>These are not posture problems. They are problems pretending to be posture problems, and they need a real exam, not a new chair.</p>

// ── VIDEO PRELOAD POOL ──────────────────────────────────────────────
// Creating a <video> at step-render time means the network fetch and
// first-frame decode happen while the patient stares at a blank card
// (~1-1.5s). Instead we create warm, buffering video elements as soon as
// the app loads, and each step ADOPTS its pooled element — first frame
// is already decoded, so the video appears instantly.
let _pracVidPool = {}; // exerciseId -> <video> element (kept for the session)

function pracPreloadVideos(){
  const list = (proto||[]).filter(s => s.exercise_name && !isLikelyExerciseId(s.exercise_name));
  list.forEach(step=>{
    const id = step && (step.exercise_id || step.ex);
    const m = exMediaFor(step);
    if(!id || !m || !m.videoUrl || _pracVidPool[id]) return;
    const v = document.createElement('video');
    v.muted = true; v.loop = true;
    v.playsInline = true;
    v.setAttribute('playsinline','');
    v.setAttribute('webkit-playsinline','');
    v.setAttribute('muted','');
    v.preload = 'auto';
    v.src = m.videoUrl;
    try{ v.load(); }catch(e){}
    _pracVidPool[id] = v;
  });
}

function pracPauseAllVideos(){
  Object.values(_pracVidPool).forEach(v=>{ try{ v.pause(); }catch(e){} });
}

function pracReleaseVideos(){
  Object.values(_pracVidPool).forEach(v=>{
    try{ v.pause(); v.removeAttribute('src'); v.load(); }catch(e){}
  });
  _pracVidPool = {};
}

  } else if(media && media.ytId){
    mediaHtml = `<div class="prac-video-hero" style="height:auto;aspect-ratio:16/9;">
      <iframe src="https://www.youtube-nocookie.com/embed/${media.ytId}?autoplay=1&mute=1&loop=1&playlist=${media.ytId}&controls=0&rel=0&modestbranding=1&playsinline=1"
        allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
    </div>`;
  }

  const CIRC_MINI = 2 * Math.PI * 25; // compact ring circumference (r=25)

  const timerHtml = mediaHtml
    ? `<div class="prac-mini-timer">
        <svg class="prac-ring-svg" viewBox="0 0 60 60" width="56" height="56">
          <circle class="prac-ring-track" cx="30" cy="30" r="25" stroke-width="5"/>
          <circle class="prac-ring-prog" cx="30" cy="30" r="25" stroke-width="5"
            stroke-dasharray="${CIRC_MINI.toFixed(1)}"
            stroke-dashoffset="0"
            stroke="var(--accent2)"
            id="prac-ring"/>
        </svg>
        <div>
          <div class="prac-mini-time" id="prac-time">${fmtTimePrac(dur)}</div>
          <div class="prac-mini-unit">remaining</div>
        </div>
      </div>`
    : `<div class="prac-ring-wrap">
        <svg class="prac-ring-svg" viewBox="0 0 260 260" width="240" height="240">
          <circle class="prac-ring-track" cx="130" cy="130" r="110" stroke-width="10"/>
          <circle class="prac-ring-prog" cx="130" cy="130" r="110" stroke-width="10"
            stroke-dasharray="${CIRC_PRAC.toFixed(1)}"
            stroke-dashoffset="0"
            stroke="var(--accent2)"
            id="prac-ring"/>
        </svg>
        <div class="prac-ring-center">
          <div class="prac-ring-time" id="prac-time">${fmtTimePrac(dur)}</div>
          <div class="prac-ring-unit">remaining</div>
        </div>
      </div>`;

  // Render body
  const pracBodyEl = document.getElementById('prac-body');
  pracBodyEl.classList.toggle('video-mode', !!mediaHtml);
  document.body.classList.toggle('prac-video-mode', !!mediaHtml);
  pracBodyEl.innerHTML = `
    <div class="prac-step-pills">${pills}</div>
    ${mediaHtml}
    ${timerHtml}

    <div>
      <div class="prac-ex-name">${stepName}</div>
      <div class="prac-ex-mod">${stepMod}</div>
    </div>

    ${cues.length?`<div class="prac-cues">${cues.map(c=>`<div class="prac-cue">${c}</div>`).join('')}</div>`:''}
  `;

  // Adopt the preloaded video element into the slot
  if(media && media.videoUrl){
    const slot = document.getElementById('prac-video-slot');
    if(slot){
      const vid = step.exercise_id || step.ex;
      let v = _pracVidPool[vid];
      if(!v){
        // Not pooled (e.g. media table changed mid-session) — create on the fly
        v = document.createElement('video');
        v.muted = true; v.loop = true; v.playsInline = true;
        v.setAttribute('playsinline',''); v.setAttribute('webkit-playsinline',''); v.setAttribute('muted','');
        v.preload = 'auto'; v.src = media.videoUrl;
        _pracVidPool[vid] = v;
      }
      // Pause every other pooled video so only this step plays
      Object.keys(_pracVidPool).forEach(k=>{
        if(String(k)!==String(vid)){ try{ _pracVidPool[k].pause(); }catch(e){} }
      });
      // Fade in on first decoded frame — kills the blank/white flash even
      // on a cold load; with a warm pool it's already at full opacity.
      v.style.transition = 'opacity .18s';
      if(v.readyState >= 2){
        v.style.opacity = '1';
      } else {
        v.style.opacity = '0';
        v.addEventListener('loadeddata', ()=>{ v.style.opacity = '1'; }, { once:true });
      }
      slot.appendChild(v);
      try{ if(v.readyState >= 1) v.currentTime = 0; }catch(e){}
      v.play().catch(()=>{});
    }
  }

  // Render controls
  renderPracControls(isLast);
  pracUpdateFsBtn();

  // Start timer
  updatePracRing(dur, dur);
  startPracTimer(dur, isLast);
}

function fmtTimePrac(s){
  const m=Math.floor(s/60), sec=s%60;
  return m>0 ? m+':'+(String(sec).padStart(2,'0')) : String(s);
}

function updatePracRing(timeLeft, totalDur){
  const frac = Math.max(0, timeLeft / totalDur);
  const ring = document.getElementById('prac-ring');
  const timeEl = document.getElementById('prac-time');
  if(ring){
    // Read the circumference off the element — the video-first layout uses
    // a smaller ring than the default layout.
    const circ = parseFloat(ring.getAttribute('stroke-dasharray')) || CIRC_PRAC;
    const offset = circ * (1 - frac);
    ring.style.strokeDashoffset = offset.toFixed(1);
    ring.style.stroke = timeLeft<=5?'var(--danger)':timeLeft<=10?'var(--warn)':'var(--accent2)';
  }
  if(timeEl) timeEl.textContent = fmtTimePrac(timeLeft);
}

function startPracTimer(dur, isLast){
  const totalDur = dur;
  pracTimer = setInterval(()=>{
    if(pracPaused) return;
    pracTimeLeft--;
    pracElapsed++;
    updatePracRing(pracTimeLeft, totalDur);
    if(pracTimeLeft <= 0){
      clearInterval(pracTimer);
      pracTimer = null;
      if(!isLast){
        // Auto-advance after 1s pause
        setTimeout(()=>{ var L=(window._pracProto||proto).length; if(pracStep < L-1) loadPracStep(pracStep+1); }, 1000);
      } else {
        // Last step done — show completion
        setTimeout(()=>finishPractice(), 800);
      }
    }
  }, 1000);
}

function renderPracControls(isLast){
  document.getElementById('prac-controls').innerHTML = `
    <button class="prac-btn-primary" id="prac-main-btn" onclick="advancePracStep()">
      ${isLast ? 'Finish practice ✓' : 'Next exercise →'}
    </button>
    <button class="prac-btn-secondary" onclick="togglePracPause()" id="prac-pause-btn">
      Pause
    </button>
    <div class="prac-timer-label" id="prac-timer-label">Timer running — you can advance early</div>
  `;
}

function advancePracStep(){
  clearInterval(pracTimer);
  pracTimer = null;
  // Add remaining time to elapsed (credit the full step)
  pracElapsed += pracTimeLeft;
  var pracList = (window._pracProto||proto);
  if(pracStep < pracList.length-1){
    loadPracStep(pracStep+1);
  } else {
    finishPractice();
  }
}

function togglePracPause(){
  pracPaused = !pracPaused;
  const btn = document.getElementById('prac-pause-btn');
  const lbl = document.getElementById('prac-timer-label');
  if(btn) btn.textContent = pracPaused ? 'Resume' : 'Pause';
  if(lbl) lbl.textContent = pracPaused ? 'Paused — tap Resume to continue' : 'Timer running — you can advance early';
}

async function finishPractice(){
  clearInterval(pracTimer);
  pracTimer = null;
  pracExitFullscreenIfActive();
  pracPauseAllVideos();
  document.body.classList.remove('prac-video-mode');

  // Use the same filtered list the runner actually played, not the raw proto
  // (which may contain orphaned steps). Falls back to proto if the practice
  // list wasn't set for some reason.
  const playedProto = (window._pracProto && window._pracProto.length) ? window._pracProto : proto;

  const totalProtoDur = playedProto.reduce((a,s)=>a+s.duration_sec,0);
  const actualDur = Math.round((Date.now()-pracStartTime)/1000);
  const durationSec = Math.min(actualDur, totalProtoDur + 60); // cap at protocol + 1 min

  // Show done screen immediately
  document.getElementById('prac-step-ct').textContent = 'Complete';
  document.getElementById('prac-body').innerHTML = `
    <div class="prac-done">
      <div class="prac-done-icon">✓</div>
      <div class="prac-done-title">Great work.</div>
      <div class="prac-done-sub">You completed your home practice session.<br>This will show in your history and your doctor's records.</div>
      <div class="prac-done-stats">
        <div class="prac-done-stat">
          <div class="prac-done-stat-val">${playedProto.length}</div>
          <div class="prac-done-stat-lbl">Exercises</div>
        </div>
        <div class="prac-done-stat">
          <div class="prac-done-stat-val">${Math.round(durationSec/60)||1}</div>
          <div class="prac-done-stat-lbl">Minutes</div>
        </div>
        <div class="prac-done-stat">
          <div class="prac-done-stat-val" id="prac-new-streak">—</div>
          <div class="prac-done-stat-lbl">Day streak</div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('prac-controls').innerHTML = `
    <button class="prac-btn-primary" onclick="exitPractice();switchTab('progress')">
      View my progress →
    </button>
    <button class="prac-btn-secondary" onclick="exitPractice()">Back to app</button>
  `;

  // Log session to Supabase (tagged as home source)
  try{
    const exercises = playedProto.map(s=>({
      name: s.exercise_name,
      mod:  s.mod_name||'Standard',
      dur:  s.duration_sec
    }));
    await sbFetch('session_logs', {
      method: 'POST',
      body: {
        patient_id:   patient.id,
        patient_name: patient.name,
        plan:         patient.plan,
        steps:        playedProto.length,
        duration_sec: durationSec,
        exercises,
        source:       'home', // distinguishes from kiosk sessions
      }
    });
    // Refresh sessions and update streak display
    sessions = await sbFetch(
      'session_logs?patient_id=eq.'+patient.id+'&order=completed_at.desc&limit=200'
    );
    const newStreak = calcStreak();
    const el = document.getElementById('prac-new-streak');
    if(el) el.textContent = newStreak;
    // Silently refresh the other tabs too
    renderHome();
    renderJourney();
  }catch(e){
    showToast('Session saved locally — will sync when online');
    console.warn('Session log error:', e);
  }
}

async function pmSb(path, opts) {
  opts = opts || {};

    headers: Object.assign({
      apikey: PM_SB_KEY,

function pmSubscribeRt(threadId) {

async function pmLoadHistory() {

}

// ── Incremental: append only messages newer than last render ──
// Used by polling so the chat doesn't flicker every 3 seconds.
var pmLastMsgId = null;
async function pmLoadNewMessages() {
  var body = document.getElementById('pm-body');
  if (!body || !pmThreadId) return false;

  // If we don't have a baseline yet, do the full load once.
  if (pmLastMsgId == null) {
    await pmLoadHistory();
    return true;
  }

  // Fetch only messages with id > last seen. Supabase UUIDs aren't ordered,
  // so order by created_at and filter client-side by id set.
  var msgs = await pmSb('/messages?thread_id=eq.' + pmThreadId + '&order=created_at.asc&limit=100');
  if (!msgs || !msgs.length) return false;

  // Find the index of our last-seen id, if present
  var lastIdx = -1;
  for (var i = 0; i < msgs.length; i++) {
    if (msgs[i].id === pmLastMsgId) { lastIdx = i; break; }
  }

  var newOnes = lastIdx === -1 ? msgs : msgs.slice(lastIdx + 1);
  if (!newOnes.length) return false;

  newOnes.forEach(function(msg) { pmAppendBubble(msg, false); });
  pmLastMsgId = msgs[msgs.length - 1].id;
  body.scrollTop = body.scrollHeight;
  return true;
}

  if (card) {
    card.querySelectorAll('.msg-slot-btn').forEach(function(b) {
      b.disabled = true; b.classList.remove('booked');
    });
  }
  btn.classList.add('booked');
  btn.textContent = '✓ ' + label;

  // Send confirmation message from patient
  try {
    await pmSb('/messages', {
      method: 'POST',
      body: JSON.stringify({
        thread_id: pmThreadId,
        patient_id: patient.id,
        sender: 'patient',
        body: '✓ ' + label + ' works for me today!'
      })
    });
    // Mark original message as booked
    await pmSb('/messages?id=eq.' + msgId, {
      method: 'PATCH',
      body: JSON.stringify({ booked: true })
    }).catch(function(){});
    // Mark thread unread for admin
    await pmSb('/message_threads?id=eq.' + pmThreadId, {
      method: 'PATCH',
      body: JSON.stringify({ unread_admin: true, last_message_at: new Date().toISOString() })
    }).catch(function(){});

    // Show confirmation toast
    showToast('Appointment request sent for ' + label + '!');

    // Reload to reflect the sent confirmation (incremental, no flicker)
    setTimeout(function() { pmLoadNewMessages(); }, 400);

  } catch(e) {
    showToast('Could not send — try again');
  }
};

// ── Textarea auto-grow ────────────────────────────────────────
window.pmGrow = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

// ── Check for unread messages on app load ─────────────────────
// Called after patient logs in — updates the unread dot
window.pmCheckUnread = async function() {
  if (!patient || !patient.id) return;
  try {
    var threads = await pmSb('/message_threads?patient_id=eq.' + patient.id + '&unread_patient=eq.true&limit=1');
    var dot = document.getElementById('msg-unread-dot');
    if (dot && threads && threads.length) dot.classList.add('show');
  } catch(e) {}
};

})();
</script>
</body>
</html>
