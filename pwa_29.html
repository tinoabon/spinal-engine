              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(200,184,154,.08)" stroke="#C8B89A" stroke-width="1.5"/>
              <path d="M 60 20 Q 60 60, 80 80 Q 100 100, 95 130" fill="none" stroke="#8FAF94" stroke-width="2"/>
              <circle cx="80" cy="80" r="8" fill="rgba(196,122,122,.30)" stroke="#C47A7A" stroke-width="2"/>
              <g stroke="#C47A7A" stroke-width="1.5" fill="none" opacity="0.8">
                <line x1="80" y1="66" x2="80" y2="60"/>
                <line x1="92" y1="72" x2="98" y2="68"/>
                <line x1="94" y1="80" x2="100" y2="80"/>
                <line x1="92" y1="88" x2="98" y2="92"/>
                <line x1="68" y1="72" x2="62" y2="68"/>
                <line x1="66" y1="80" x2="60" y2="80"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C47A7A" letter-spacing="0.08em">IRRITATED NERVE</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">often what "sciatica" means</text>
            </g>
          </svg>
          <div class="art-figcaption">The three usual suspects. Most lower back pain is one of these — or a combination of them — not a structural emergency.</div>
        </figure>

        <p><strong>A joint stopped gliding properly.</strong> The facet joint got stuck or restricted. It is small, but its protest is loud.</p>

        <p><strong>A muscle is locked down.</strong> Often as a protective response to the joint above. Muscles are not subtle when they are tired of holding something steady.</p>

        <p><strong>A nerve is being irritated.</strong> Usually mechanically — by an inflamed joint or a tight muscle, not by structural damage. This is what most people mean when they say "my sciatica is flaring."</p>

        <p>Sharp pain that comes and goes, dull aches that build over a day, the feeling of being "off" on one side — these are the languages those three things speak.</p>

        <h2 class="art-h2"><span class="art-h2-num">03</span>Why MRIs scare people more than they should</h2>

        <p>This is the part nobody is told. When researchers MRI the lower backs of pain-free adults — people walking around with zero symptoms — they find "abnormalities" in roughly 60% of them. Disc bulges. Degeneration. Mild facet arthritis. Findings that absolutely come back on a report, and absolutely make a person nervous if they do not know better.</p>

        <p>What that tells us: those findings are normal. They are signs of being a human who has used a body for a few decades. They do not, by themselves, cause pain. Plenty of people have them and feel great. Plenty of people have completely clean MRIs and feel terrible.</p>

        <div class="art-callout">
          <div class="art-callout-label">In Plain Terms</div>
          <p class="art-callout-body">An imaging report is information, not a diagnosis. Pain has to be matched to the body that is in pain — what aggravates it, what relieves it, how it moves — not to a picture in isolation.</p>
        </div>

        <h2 class="art-h2"><span class="art-h2-num">04</span>What actually helps</h2>

        <p>The instinct, especially with a brand-new flare, is to lie down. To stop moving until things calm down. This is one of the few things research has been remarkably consistent about for thirty years: prolonged bed rest makes mechanical low back pain <em>worse</em>, not better.</p>

        <p>Movement helps. Specifically:</p>

        <p><strong>Walking.</strong> Five to ten minute walks, several times a day. Walking is the single most underrated tool for a lower back that is acting up. It costs nothing and asks almost nothing of you.</p>

        <p><strong>Targeted motion.</strong> The exercises prescribed in this app were picked specifically for what is irritated and what needs to wake back up. They are short on purpose. The point is repetition, not heroism.</p>

        <p><strong>Heat for muscles, ice for sharp pain.</strong> Same rule as everywhere else. Twenty minutes at a time, several times a day if needed.</p>

        <p><strong>Sleep.</strong> Side-lying with a pillow between the knees is the gentlest position for most lower backs. The nervous system does most of its repair work overnight.</p>

        <p>Time is also a real ingredient. Most mechanical lower back pain improves substantially within two to four weeks of consistent care and movement. The patients who do worst are usually the ones who froze in fear of moving wrong — not the ones who moved too much.</p>

        <div class="art-pullquote">Most lower back pain is mechanical, not structural — a stuck joint or a tired muscle, not a broken spine. The body is far more resilient than the internet at 11pm would have you believe.</div>

        <h2 class="art-h2"><span class="art-h2-num">05</span>When to skip everything above and call someone</h2>

        <p>The list is short. The items on it are uncommon. But they are the reason this section exists.</p>

        <div class="art-warning">
          <div class="art-warning-label">Call the office or seek care if you notice</div>
          <ul>
            <li><strong>Numbness in the groin or saddle area</strong>, or new trouble controlling the bladder or bowels.</li>
            <li><strong>Progressive weakness in a leg</strong> — not a brief tingle, but actually being unable to lift the foot or push off it normally.</li>
            <li><strong>Severe back pain at night</strong> that is unrelated to position and not tied to a recent injury.</li>
            <li><strong>Back pain with a fever</strong>, or in someone with a history of cancer.</li>
            <li><strong>A sudden, severe injury</strong> — a fall, a car accident — that produced new severe pain.</li>
          </ul>
        </div>

        <p>None of these are reasons to panic. They are reasons to get someone looking sooner rather than later, because the answer might be different from a typical mechanical flare. Nobody is ever annoyed by a patient calling to ask.</p>

        <p>For everything else: keep moving, do the practice, and give the body the time it is designed to use.</p>

        <div class="art-end-mark">· · ·</div>

        <div class="art-footer">
          <strong>About this guide.</strong> This is general patient education and is not medical advice for any specific person. Lower back pain is common but varies a great deal between individuals — any concerns about a specific symptom should go directly to the treating chiropractor or a relevant medical provider. If symptoms feel like a medical emergency, call 911 or go to the nearest emergency department.
        </div>
      </div>
    `
  },

  'disc-health': {
    title: 'Disc health and what affects it',
    headTitle: 'Your condition',
    body: `
      <div class="art-kicker">Your Condition</div>
      <h1 class="art-h1">Your spinal discs are not what you think they are.</h1>
      <p class="art-deck">A plain-language guide to the most misunderstood part of your spine — what discs actually do, why they wear down, and what keeps them happy.</p>
      <div class="art-byline">A short read · About 5 minutes · <strong>For anyone who has ever heard the word "bulge" on an MRI</strong></div>

      <div class="art-body">
        <p class="art-lede">Here is what most people picture when they hear "spinal disc": a small hockey puck that can slide out of place, like a coaster knocked off a stack. The chiropractor mentioned a "bulge." An MRI report used words like "degeneration." A friend said theirs "slipped." Nobody bothered to explain what any of that actually means.</p>

        <p>That mental picture is wrong in nearly every way that matters. And it is the reason a lot of people are quietly afraid of moving.</p>

        <h2 class="art-h2"><span class="art-h2-num">01</span>What a disc actually is</h2>

        <p>Between each pair of vertebrae in your spine sits a disc. There are 23 of them in total. None of them are a hockey puck.</p>

        <p>A disc is more like a jelly donut, if the donut were made of cartilage. The outer ring is tough, layered cartilage — built like the radial layers of a tire — designed to handle compression and twisting. The center is a gel that is roughly 80% water at birth, slowly dropping over the decades. The whole structure is firmly bonded to the vertebrae above and below. It does not — and cannot — slip out like a coaster off a stack.</p>

        <p>What discs do is absorb load. Every step, every cough, every time you bend to pick something up, the discs cushion the spine. They also let the spine move. Without them, the vertebrae would be one rigid column, and bending over to tie a shoe would be impossible.</p>

        <h2 class="art-h2"><span class="art-h2-num">02</span>How discs eat and breathe</h2>

        <p>Here is the part that almost nobody is told, and it changes how you think about everything else in this article.</p>

        <p>Discs do not have a real blood supply of their own. That sounds like a problem — how does anything stay alive? — but it is not. The trick is that discs feed themselves through motion.</p>

        <p>When you move, the pressure changes around the disc. Bending forward compresses the front; leaning back compresses the rear. Each compression squeezes fluid out, and each release lets fresh fluid — carrying water, oxygen, and nutrients — get sucked back in. The disc is, in effect, a sponge that has to be wrung out and re-soaked all day in order to stay alive.</p>

        <figure class="art-figure">
          <svg viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three panels showing a healthy disc, a sedentary disc, and a rehydrated disc after motion">
            <g transform="translate(35, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(143,175,148,.10)" stroke="#8FAF94" stroke-width="1.5"/>
              <rect x="35" y="42" width="70" height="18" rx="3" fill="rgba(232,226,217,.18)" stroke="#A89F94" stroke-width="1.2"/>
              <ellipse cx="70" cy="75" rx="38" ry="11" fill="rgba(143,175,148,.30)" stroke="#8FAF94" stroke-width="2"/>
              <ellipse cx="70" cy="75" rx="22" ry="6" fill="rgba(143,175,148,.55)"/>
              <rect x="35" y="92" width="70" height="18" rx="3" fill="rgba(232,226,217,.18)" stroke="#A89F94" stroke-width="1.2"/>
              <g stroke="#8FAF94" stroke-width="1.6" fill="none">
                <path d="M 12 75 L 28 75"/>
                <polyline points="22,71 28,75 22,79"/>
                <path d="M 128 75 L 112 75"/>
                <polyline points="118,71 112,75 118,79"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#8FAF94" letter-spacing="0.08em">HEALTHY</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">plump, hydrated</text>
            </g>
            <g transform="translate(225, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(196,122,122,.08)" stroke="#C47A7A" stroke-width="1.5"/>
              <rect x="35" y="48" width="70" height="18" rx="3" fill="rgba(232,226,217,.18)" stroke="#A89F94" stroke-width="1.2"/>
              <ellipse cx="70" cy="75" rx="38" ry="6" fill="rgba(196,122,122,.22)" stroke="#C47A7A" stroke-width="2"/>
              <ellipse cx="70" cy="75" rx="20" ry="3" fill="rgba(196,122,122,.40)"/>
              <rect x="35" y="85" width="70" height="18" rx="3" fill="rgba(232,226,217,.18)" stroke="#A89F94" stroke-width="1.2"/>
              <g stroke="#C47A7A" stroke-width="1.3" fill="none" opacity="0.7">
                <line x1="35" y1="40" x2="105" y2="40"/>
                <polyline points="40,36 35,40 40,44"/>
                <polyline points="100,36 105,40 100,44"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C47A7A" letter-spacing="0.08em">SEDENTARY</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">compressed, starved</text>
            </g>
            <g transform="translate(415, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(143,175,148,.10)" stroke="#8FAF94" stroke-width="1.5"/>
              <rect x="35" y="42" width="70" height="18" rx="3" fill="rgba(232,226,217,.18)" stroke="#A89F94" stroke-width="1.2"/>
              <ellipse cx="70" cy="75" rx="38" ry="11" fill="rgba(143,175,148,.30)" stroke="#8FAF94" stroke-width="2"/>
              <ellipse cx="70" cy="75" rx="22" ry="6" fill="rgba(143,175,148,.55)"/>
              <rect x="35" y="92" width="70" height="18" rx="3" fill="rgba(232,226,217,.18)" stroke="#A89F94" stroke-width="1.2"/>
              <g stroke="#8FAF94" stroke-width="1.5" fill="none" opacity="0.85">
                <path d="M 22 32 Q 30 25, 38 32"/>
                <polyline points="34,28 38,32 34,36"/>
                <path d="M 102 118 Q 110 125, 118 118"/>
                <polyline points="114,122 118,118 114,114"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#8FAF94" letter-spacing="0.08em">WITH MOTION</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">rehydrated, fed</text>
            </g>
          </svg>
          <div class="art-figcaption">Discs are pumped, not fed. Motion is how nutrients get in and waste gets out — sitting motionless for hours starves them.</div>
        </figure>

        <h2 class="art-h2"><span class="art-h2-num">03</span>What wears them down</h2>

        <p>Discs do change over time. Some of that is unavoidable; most of it is the result of habits that are surprisingly modifiable.</p>

        <p><strong>Sitting for hours.</strong> Eight hours in a chair without breaks compresses the front of the lumbar discs without ever giving them a chance to rehydrate. This is not opinion. People who sit for a living have, on average, more disc problems than people who move for a living.</p>

        <p><strong>Smoking.</strong> Smoking is one of the most consistent risk factors for early disc degeneration. The likely reason: nicotine constricts the small blood vessels at the disc edges and impairs the already-limited nutrient flow.</p>

        <p><strong>Repeated bad lifting.</strong> Lifting heavy occasionally is much less of a problem than lifting moderate weight in a bad position thousands of times. Discs handle compression well. They handle compression-plus-twist much less well.</p>

        <p><strong>Dehydration and lost sleep.</strong> Discs swell with water overnight — which is why most people are slightly taller in the morning. Chronic dehydration and broken sleep both undercut that nightly rebuild.</p>

        <p><strong>Age.</strong> Some loss of water content is normal, in the same way some loss of skin elasticity is normal. Disc "degeneration" on a 50-year-old MRI is a description, not a diagnosis. The disc has simply changed. Whether it actually hurts depends on a lot more than what the picture shows.</p>

        <div class="art-callout">
          <div class="art-callout-label">In Plain Terms</div>
          <p class="art-callout-body">Most of what damages discs is not a single bad lift. It is years of habits — long sitting, shallow sleep, dehydration, smoking — that quietly subtract from a system designed to rebuild itself nightly.</p>
        </div>

        <h2 class="art-h2"><span class="art-h2-num">04</span>What keeps them healthy</h2>

        <p>Almost everything on this list is something you already do every day. The trick is doing it on purpose.</p>

        <p><strong>Move often, especially during desk work.</strong> Stand up and walk every 30 to 45 minutes. The walking does not have to be long. The disruption of the static load is what matters.</p>

        <p><strong>Stay hydrated.</strong> Discs cannot rehydrate themselves out of nothing. Plain water through the day, not just coffee in the morning and a beer at night.</p>

        <p><strong>Lift with motion in mind.</strong> A clean, smooth movement pattern with light or moderate weight is doing your discs a favor. A wrenching, half-twisted heave with too much weight is doing the opposite. Form is not a vanity issue; it is a disc issue.</p>

        <p><strong>Sleep enough, on your side or back.</strong> Stomach sleeping requires the neck to be twisted for hours and the lumbar curve to be flattened. Side-lying with a pillow between the knees is the gentlest position for most people.</p>

        <p><strong>Do not smoke.</strong> This is the highest-leverage one. If you do nothing else on this list, this one alone changes the trajectory.</p>

        <div class="art-pullquote">Discs are pumped, not fed. They have almost no blood supply — they need motion to stay alive. The eight-hour chair is not neutral. It is slow disc starvation.</div>

        <h2 class="art-h2"><span class="art-h2-num">05</span>When something is genuinely wrong</h2>

        <p>Most disc-related pain is not an emergency. The vast majority of disc bulges, and even most herniations, resolve on their own over weeks and months with time, motion, and care. But a small number of presentations warrant getting someone looking sooner rather than later.</p>

        <div class="art-warning">
          <div class="art-warning-label">Call the office or seek care if you notice</div>
          <ul>
            <li><strong>Numbness in the groin or saddle area</strong>, or new trouble controlling the bladder or bowels.</li>
            <li><strong>Progressive weakness in a leg</strong> — actually losing strength, not just a passing tingle.</li>
            <li><strong>Pain shooting down one leg</strong> that is getting worse over weeks rather than better.</li>
            <li><strong>A sudden, severe injury</strong> — a fall, a heavy lift gone wrong — that produced new severe pain.</li>
            <li><strong>Pain that wakes you up at night</strong> and cannot be relieved by any position.</li>
          </ul>
        </div>

        <p>None of these mean a disc is "destroyed." They mean the standard recovery picture is not happening on its own, and an actual exam is warranted.</p>

        <p>For everything else: keep moving, stay hydrated, sleep well, and trust the body to do what it has done for the rest of vertebrate history.</p>

        <div class="art-end-mark">· · ·</div>

        <div class="art-footer">
          <strong>About this guide.</strong> This is general patient education and is not medical advice for any specific person. Spinal discs and the conditions affecting them vary considerably between individuals — any concerns about a specific symptom or imaging finding should go directly to the treating chiropractor or a relevant medical provider. If symptoms feel like a medical emergency, call 911 or go to the nearest emergency department.
        </div>
      </div>
    `
  },

  'cervical-strain': {
    title: 'Cervical strain & neck tension',
    headTitle: 'Your condition',
    body: `
      <div class="art-kicker">Your Condition</div>
      <h1 class="art-h1">Your neck holds up your head all day. It deserves better.</h1>
      <p class="art-deck">Why the neck is the most chronically tense region in the body, what is actually causing it, and the small changes that move the needle.</p>
      <div class="art-byline">A short read · About 4 minutes · <strong>For anyone who reaches for their neck without thinking about it</strong></div>

      <div class="art-body">
        <p class="art-lede">At some point in the last week, you reached up and squeezed the back of your neck without thinking about it. Maybe at the end of a long meeting. Maybe after scrolling for too long. Maybe just driving home. The hand goes up, the thumb digs into the same spot it always does, and there is a familiar grinding tightness that you barely register anymore.</p>

        <p>That spot has a story. This article is about what is happening there, why it is so common, and what to do about it.</p>

        <h2 class="art-h2"><span class="art-h2-num">01</span>Why the neck takes so much heat</h2>

        <p>The neck is doing something nothing else in the body has to do. It is holding up roughly ten to twelve pounds — your head — at the end of a fairly thin column of seven vertebrae, all day, for your entire life. It also has to let that ten-pound bowling ball rotate in every direction so you can drive, see your kids, scan a room, type at a screen.</p>

        <p>That is already a hard engineering problem. Now add modern life on top of it. The average adult looks down at a phone four to six hours a day. Layer in laptop work, driving, reading. The neck spends most of its waking time bent forward of where it was designed to live.</p>

        <p>Here is the part most people are surprised by: every inch the head moves forward of the shoulders multiplies the load on the muscles holding it up. A head held neutral is the ten-to-twelve pound figure. A head leaned forward into a phone position can put something closer to 40 pounds of effective load on those muscles. Sustained for hours, every day, for years.</p>

              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C47A7A" letter-spacing="0.08em">PHONE POSITION</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">looking down</text>
            </g>
          </svg>
          <div class="art-figcaption">The neck is not tense for no reason. Every inch the head leans forward multiplies the load on the muscles holding it up.</div>
        </figure>

        <h2 class="art-h2"><span class="art-h2-num">02</span>What "neck tension" usually is</h2>

        <p>Three things, again. The neck has the same general suspects as the lower back, but in different proportions.</p>

        <p><strong>Overworked muscles.</strong> This is by far the biggest one in the neck. The deep stabilizing muscles at the base of the skull (suboccipitals) and the broad ones across the top of the shoulders (upper traps) end up doing what posture and structure should be doing. They are not designed for sustained contraction for hours at a time. They protest by getting tight, ropey, and tender to the touch.</p>

        <p><strong>Stuck facet joints.</strong> Same small joints as in the lower back, just in the neck. When one stops gliding, the surrounding muscles clench around it as a protective response. The clench is the part you feel; the joint is the part causing the clench.</p>

        <p><strong>Irritated nerves.</strong> Less common, but when it happens it is loud — a sharp pain or tingling that runs into the shoulder, down the arm, sometimes to the fingers. Usually mechanical: a joint or a tight muscle is irritating the nerve as it exits the neck.</p>

        <h2 class="art-h2"><span class="art-h2-num">03</span>Why your head hurts too</h2>

        <p>This is the part nobody seems to mention. A large portion of recurring headaches actually originate in the neck. The medical term is "cervicogenic," meaning "of cervical origin," meaning "your neck did this."</p>

        <p>The mechanism is straightforward. The top three vertebrae of the neck share nerve pathways with the nerves that supply the back of the head, the temples, and the area behind the eyes. When those joints get restricted and the surrounding muscles get tight, the nervous system can refer pain forward into the head. Patients describe it as a band around the head, a deep ache behind one eye, or a tension that builds through the day and peaks in the evening.</p>

        <p>If your headaches start at the base of the skull and creep upward, or get worse with neck movement, or come on after long days at the screen — there is a real chance the neck is the source, not the head.</p>

        <div class="art-callout">
          <div class="art-callout-label">In Plain Terms</div>
          <p class="art-callout-body">A surprising number of recurring headaches are neck problems wearing a headache costume. Treating the neck often resolves the headache for good.</p>
        </div>

        <h2 class="art-h2"><span class="art-h2-num">04</span>What actually helps</h2>

        <p>Most of this is about taking pressure off muscles that have been doing too much.</p>

        <p><strong>The simplest move: look up.</strong> Several times a day, gently tilt the head back and look at the ceiling for ten to twenty seconds. The neck spends so much time looking down that this single motion — done a few times a day — reverses a real fraction of the daily load.</p>

        <p><strong>Raise the screen.</strong> The top of your monitor should sit at roughly eye level. The phone should come up to your eyes, not the other way around. Sounds obvious. Almost nobody actually does it.</p>

        <p><strong>Sleep with the right pillow.</strong> This matters more for the neck than for any other region. The pillow should keep the head in roughly the same plane as the spine — not propped up too high, not flattened too low. Stomach sleeping is the worst position for the neck because it requires hours of sustained rotation; if it is unbreakable, at least use the flattest pillow possible.</p>

        <p><strong>Move the neck, gently, often.</strong> Slow circles. Side to side. Chin tucks. The exercises prescribed in this app are picked for whatever pattern is causing trouble, but in general: motion is the antidote to chronic tension.</p>

        <p><strong>Address the stress.</strong> Less measurable but real. The upper trapezius is the body's tension reservoir — it stores emotional load before any other muscle does. People in stressful periods of life carry their shoulders higher without realizing it. Anything that lowers baseline stress (sleep, walking, breathing exercises, hobbies that take you out of your head) tends to drop neck tension within days.</p>

        <p><strong>Heat for tight muscles.</strong> Heat is generally the right call for the chronic-tightness type of neck pain. Ice is better for new, sharp, inflamed pain. Twenty minutes at a time.</p>

        <div class="art-pullquote">The upper trapezius is the body's tension reservoir. It stores emotional load before any other muscle does. Anything that lowers baseline stress tends to drop neck tension within days.</div>

        <h2 class="art-h2"><span class="art-h2-num">05</span>When something is genuinely wrong</h2>

        <p>Most neck pain is mechanical and unconcerning. A small number of presentations warrant a closer look.</p>

        <div class="art-warning">
          <div class="art-warning-label">Call the office or seek care if you notice</div>
          <ul>
            <li><strong>Numbness, tingling, or weakness in an arm or hand</strong> — especially if it is getting worse, not better.</li>
            <li><strong>A sudden, severe headache</strong> that feels unlike any familiar headache.</li>
            <li><strong>Dizziness, vision changes, or trouble with balance or speech</strong> that came on with the neck pain.</li>
            <li><strong>Neck stiffness with a fever</strong> — uncommon but worth getting looked at the same day.</li>
            <li><strong>Pain that follows a real injury</strong> — a fall, a car accident — and is not improving over a few days.</li>
          </ul>
        </div>

        <p>None of these are reasons to panic. They are reasons to get someone with hands and training to take a look, because a typical mechanical flare looks different from those presentations.</p>

        <p>For everything else: look up, raise the screen, sleep on a decent pillow, breathe out, and let the practice exercises do their job.</p>

        <div class="art-end-mark">· · ·</div>

        <div class="art-footer">
          <strong>About this guide.</strong> This is general patient education and is not medical advice for any specific person. The load figures shown are illustrative estimates from a widely-cited model — the directional point (more forward head = more load) is well-established, but the exact numbers will vary by individual. Any concerns about a specific symptom should go directly to the treating chiropractor or a relevant medical provider. If symptoms feel like a medical emergency, call 911 or go to the nearest emergency department.
        </div>
      </div>
    `
  },

  'si-joint': {
    title: 'SI joint dysfunction explained',
    headTitle: 'Your condition',
    body: `
      <div class="art-kicker">Your Condition</div>
      <h1 class="art-h1">The most distinctively-located pain in the body.</h1>
      <p class="art-deck">What the SI joint is, why it gets missed by almost everyone except a clinician who is looking for it, and what actually helps.</p>
      <div class="art-byline">A short read · About 3 minutes · <strong>For anyone who can point to exactly where it hurts</strong></div>

      <div class="art-body">
        <p class="art-lede">There is a spot, roughly the size of a fifty-cent piece, sitting just above and to the side of the tailbone. When it hurts, it hurts there. When it is the source of a person's pain, they almost always point to that exact spot. And yet most patients have never heard the name of the joint underneath it.</p>

        <p>This article is about that joint.</p>

        <h2 class="art-h2"><span class="art-h2-num">01</span>Where it is, and why it gets missed</h2>

        <p>The sacroiliac joint — usually shortened to "SI joint" — is the seam where the sacrum meets the pelvis. You have one on each side. They are the structural handoff between your spine and your legs. Every step you take, every load your body carries, gets transmitted through these two joints.</p>

        <p>Despite that workload, they barely move. A healthy SI joint glides only a few millimeters in any direction, and that is by design. It is not a moving joint in the way a hip or shoulder is; it is a load-distributing joint that gives just enough to absorb shock without giving so much that the pelvis falls apart.</p>

        <p>That tiny range of motion is part of why SI joint problems get missed. Imaging shows almost nothing useful here — the motion is too small to capture in a snapshot. The diagnosis is clinical: where the patient points with one finger, and how the joint responds to specific tests. SI joint pain also has a habit of impersonating other things. It can radiate down the back of the thigh and feel like sciatica. It can sit close enough to the hip that patients call it hip pain. It can blur into generic low back pain. Most of the time, the giveaway is simple: a single finger landing just above and to the side of the tailbone.</p>

        <h2 class="art-h2"><span class="art-h2-num">02</span>Two ways it goes wrong</h2>

        <p>The phrase "SI joint dysfunction" gets used loosely. There are actually two different problems hiding under that name, and they need different care.</p>

        <figure class="art-figure">
          <svg viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three panels showing a stuck SI joint, a healthy SI joint, and an unstable SI joint">
            <g transform="translate(35, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(200,184,154,.10)" stroke="#C8B89A" stroke-width="1.5"/>
              <path d="M 15 38 L 60 45 L 64 105 L 15 112 Z" fill="rgba(232,226,217,.18)" stroke="#A89F94" stroke-width="1.5"/>
              <path d="M 76 45 L 80 105 Q 120 108, 124 75 Q 122 45, 115 40 Z" fill="rgba(232,226,217,.18)" stroke="#A89F94" stroke-width="1.5"/>
              <g stroke="#C8B89A" stroke-width="2.2" opacity="0.9">
                <line x1="62" y1="48" x2="77" y2="50"/>
                <line x1="64" y1="104" x2="79" y2="104"/>
              </g>
              <g stroke="#C8B89A" stroke-width="1.4" opacity="0.75">
                <line x1="63" y1="62" x2="77" y2="63"/>
                <line x1="63" y1="76" x2="77" y2="77"/>
                <line x1="64" y1="90" x2="78" y2="91"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C8B89A" letter-spacing="0.08em">STUCK</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">hypomobile, locked</text>
            </g>
            <g transform="translate(225, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(143,175,148,.10)" stroke="#8FAF94" stroke-width="1.5"/>
              <path d="M 15 38 L 60 45 L 64 105 L 15 112 Z" fill="rgba(232,226,217,.18)" stroke="#A89F94" stroke-width="1.5"/>
              <path d="M 76 45 L 80 105 Q 120 108, 124 75 Q 122 45, 115 40 Z" fill="rgba(232,226,217,.18)" stroke="#A89F94" stroke-width="1.5"/>
              <line x1="70" y1="46" x2="70" y2="104" stroke="#8FAF94" stroke-width="2" opacity="0.85"/>
              <g stroke="#8FAF94" stroke-width="1.3" fill="none" opacity="0.85">
                <path d="M 62 72 L 56 72"/>
                <polyline points="60,69 56,72 60,75"/>
                <path d="M 78 78 L 84 78"/>
                <polyline points="80,75 84,78 80,81"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#8FAF94" letter-spacing="0.08em">HEALTHY</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">a few millimeters of glide</text>
            </g>
            <g transform="translate(415, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(196,122,122,.08)" stroke="#C47A7A" stroke-width="1.5"/>
              <path d="M 15 32 L 60 39 L 64 99 L 15 106 Z" fill="rgba(232,226,217,.18)" stroke="#A89F94" stroke-width="1.5"/>
              <path d="M 76 51 L 80 111 Q 120 114, 124 81 Q 122 51, 115 46 Z" fill="rgba(232,226,217,.18)" stroke="#A89F94" stroke-width="1.5"/>
              <line x1="62" y1="40" x2="77" y2="52" stroke="#C47A7A" stroke-width="1.8" stroke-dasharray="3,3"/>
              <line x1="64" y1="100" x2="79" y2="110" stroke="#C47A7A" stroke-width="1.8" stroke-dasharray="3,3"/>
              <g stroke="#C47A7A" stroke-width="1.5" fill="none" opacity="0.85">
                <path d="M 60 60 L 48 56"/>
                <polyline points="54,53 48,56 54,60"/>
                <path d="M 80 90 L 92 94"/>
                <polyline points="86,90 92,94 86,98"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C47A7A" letter-spacing="0.08em">UNSTABLE</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">hypermobile, sloppy</text>
            </g>
          </svg>
          <div class="art-figcaption">A healthy SI joint glides a few millimeters. When it stops moving altogether, or starts moving too much, the system that lives on top of it pays the price.</div>
        </figure>

        <p><strong>Stuck (hypomobile).</strong> The joint has stopped gliding. The two bone surfaces are locked in one position. The body interprets this as a problem — surrounding muscles tighten around the joint as protection, and the area becomes sore and stiff. This is the most common version, and the one chiropractic adjustments are particularly good at addressing. One adjustment often produces immediate relief.</p>

        <p><strong>Unstable (hypermobile).</strong> The opposite problem. The joint moves too much. The ligaments that normally hold it snug have become loose, and the joint shifts around with movement and loading. This is common during and after pregnancy, and in people with naturally loose joints. Adjustment alone does not fix this — strength and stability work is the answer. Hypermobile joints take weeks to months to settle, not days.</p>

        <p>It matters which one you have. A stuck joint that gets stretched and a loose joint that gets adjusted both feel worse, not better. This is why a real exam matters more than a generic protocol.</p>

        <div class="art-callout">
          <div class="art-callout-label">In Plain Terms</div>
          <p class="art-callout-body">If you can point to your pain with one finger, and that finger lands just above and to the side of the tailbone — there is a real chance the SI joint is the source, regardless of what an MRI says.</p>
        </div>

        <h2 class="art-h2"><span class="art-h2-num">03</span>What actually helps</h2>

        <p>A few principles cover most cases, regardless of which type.</p>

        <p><strong>Stop sitting unevenly.</strong> Wallet under one buttock, always crossing the same leg, leaning on one elbow at the desk — these habits add up to thousands of hours of asymmetric load on the SI joints. The fix is mostly just noticing.</p>

        <p><strong>Hip mobility matters.</strong> The hips and the SI joints share work. When the hips are tight, the SI joints get forced to compensate. Most SI flare-ups improve dramatically when hip mobility improves.</p>

        <p><strong>Glute strength is non-negotiable.</strong> The gluteal muscles are the main stabilizers of the pelvis. When they are weak, the SI ligaments end up doing work they were not designed for, and the joint either gets stuck or sloppy. The exercises prescribed in this app for SI dysfunction lean heavily on hip and glute work — there is a reason.</p>

        <p><strong>For the stuck type: get adjusted.</strong> Manual restoration of joint motion is what chiropractic was built for, and the SI joint responds particularly well.</p>

        <p><strong>For the unstable type: do not stretch it.</strong> The instinct with a painful area is to "loosen it up." With a hypermobile joint, that makes things worse. Stability work — single-leg balance, glute strength, core integration — is the medicine. Be patient.</p>

        <div class="art-pullquote">A stuck SI joint that gets stretched, and a loose SI joint that gets adjusted, both feel worse. A real exam matters more than a generic protocol.</div>

        <h2 class="art-h2"><span class="art-h2-num">04</span>When to call</h2>

        <p>Most SI joint dysfunction is mechanical and resolves with care. A few presentations warrant getting looked at sooner.</p>

        <div class="art-warning">
          <div class="art-warning-label">Call the office or seek care if you notice</div>
          <ul>
            <li><strong>Numbness in the groin or saddle area</strong>, or new trouble controlling the bladder or bowels.</li>
            <li><strong>Progressive weakness in a leg</strong> — actually losing strength.</li>
            <li><strong>Fever along with SI joint pain</strong> — uncommon but a same-day call.</li>
            <li><strong>Pain that follows a real injury</strong> — a fall on the buttocks, a car accident — and is not improving over a few days.</li>
            <li><strong>Severe pain at night</strong> that is unrelated to position.</li>
          </ul>
        </div>

        <p>For everything else: notice how you sit, work the hips and glutes, get adjusted if you are the stuck type, train the stabilizers if you are the unstable type, and trust the process.</p>

        <div class="art-end-mark">· · ·</div>

        <div class="art-footer">
          <strong>About this guide.</strong> This is general patient education and is not medical advice for any specific person. SI joint presentations vary considerably between individuals — pregnancy-related instability, post-traumatic dysfunction, and inflammatory conditions of the SI joint all need different approaches. Any concerns about a specific symptom should go directly to the treating chiropractor or a relevant medical provider. If symptoms feel like a medical emergency, call 911 or go to the nearest emergency department.
        </div>
      </div>
    `
  },

  'what-is-chiropractic': {
    title: 'What is chiropractic care?',
    headTitle: 'Understanding chiropractic',
    body: `
      <div class="art-kicker">Understanding Chiropractic</div>
      <h1 class="art-h1">What chiropractic actually is.</h1>
      <p class="art-deck">A clear-eyed explanation of what chiropractors do, how it works, what it helps with, and what it does not.</p>
      <div class="art-byline">A short read · About 5 minutes · <strong>For anyone whose mental picture comes from movies or hearsay</strong></div>

      <div class="art-body">
        <p class="art-lede">Ask ten people on the street what chiropractic actually is, and you will get ten different answers. Most are at least partly wrong. Some are very wrong. This article is the explanation we wish every new patient had read before walking through the door.</p>

        <h2 class="art-h2"><span class="art-h2-num">01</span>What it actually is</h2>

        <p>Chiropractic is the practice of restoring motion to joints — primarily, but not exclusively, the joints of the spine — using precise hands-on techniques. That is the whole job description. Everything else flows from that.</p>

        <p>The defining tool of the profession is the adjustment: a quick, controlled movement applied to a specific joint that has stopped gliding the way it should. The sound that sometimes accompanies it — the famous "pop" — is not bones breaking, grinding, or shifting. It is a small release of gas from the joint fluid, the same phenomenon as cracking a knuckle. The pop is incidental. The motion is the point.</p>

        <p>Chiropractors are licensed healthcare providers. The training is four years of doctoral-level education after a bachelor’s degree, plus national board examinations and state licensing. The profession has been formally regulated for more than 100 years. None of which means a patient has to take it on faith — but it does mean chiropractic is not, as some still imagine, a hobby practiced by self-taught enthusiasts.</p>

        <h2 class="art-h2"><span class="art-h2-num">02</span>How it actually works</h2>

        <p>This is the part most patients have never had explained.</p>

        <p>When a joint stops moving correctly — whether from a single bad lift, hours of poor sitting, an old injury, or the accumulated wear of life — the body notices. The muscles around the joint clench protectively, the nerve signals coming out of that segment of the spine get noisier than they should, and the area becomes a small chronic problem. Pain often radiates somewhere else entirely (a stuck mid-back joint can produce shoulder tension, a stuck low back joint can produce hip pain), which is part of why the source so often gets missed.</p>

        <figure class="art-figure">
          <svg viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three panels showing a stuck joint, an adjustment restoring motion, and the system relaxing afterward">
            <g transform="translate(35, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(196,122,122,.08)" stroke="#C47A7A" stroke-width="1.5"/>
              <rect x="40" y="30" width="60" height="22" rx="3" fill="rgba(232,226,217,.20)" stroke="#A89F94" stroke-width="1.2"/>
              <rect x="40" y="64" width="60" height="22" rx="3" fill="rgba(196,122,122,.30)" stroke="#C47A7A" stroke-width="2"/>
              <rect x="40" y="98" width="60" height="22" rx="3" fill="rgba(232,226,217,.20)" stroke="#A89F94" stroke-width="1.2"/>
              <g stroke="#C47A7A" stroke-width="1.5" fill="none">
                <line x1="104" y1="68" x2="112" y2="66"/>
                <line x1="106" y1="75" x2="114" y2="75"/>
                <line x1="104" y1="82" x2="112" y2="84"/>
                <line x1="36" y1="68" x2="28" y2="66"/>
                <line x1="34" y1="75" x2="26" y2="75"/>
                <line x1="36" y1="82" x2="28" y2="84"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C47A7A" letter-spacing="0.08em">STUCK</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">joint stopped gliding</text>
            </g>
            <g transform="translate(225, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(200,184,154,.10)" stroke="#C8B89A" stroke-width="1.5"/>
              <rect x="40" y="30" width="60" height="22" rx="3" fill="rgba(232,226,217,.20)" stroke="#A89F94" stroke-width="1.2"/>
              <rect x="40" y="64" width="60" height="22" rx="3" fill="rgba(200,184,154,.32)" stroke="#C8B89A" stroke-width="2"/>
              <rect x="40" y="98" width="60" height="22" rx="3" fill="rgba(232,226,217,.20)" stroke="#A89F94" stroke-width="1.2"/>
              <g stroke="#C8B89A" stroke-width="1.7" fill="none">
                <path d="M 22 75 L 36 75"/>
                <polyline points="30,71 36,75 30,79"/>
                <path d="M 118 75 L 104 75"/>
                <polyline points="110,71 104,75 110,79"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C8B89A" letter-spacing="0.08em">ADJUSTMENT</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">motion restored</text>
            </g>
            <g transform="translate(415, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(143,175,148,.10)" stroke="#8FAF94" stroke-width="1.5"/>
              <rect x="40" y="30" width="60" height="22" rx="3" fill="rgba(143,175,148,.22)" stroke="#8FAF94" stroke-width="1.2"/>
              <rect x="40" y="64" width="60" height="22" rx="3" fill="rgba(143,175,148,.30)" stroke="#8FAF94" stroke-width="1.5"/>
              <rect x="40" y="98" width="60" height="22" rx="3" fill="rgba(143,175,148,.22)" stroke="#8FAF94" stroke-width="1.2"/>
              <g stroke="#8FAF94" stroke-width="1.3" fill="none" opacity="0.75">
                <path d="M 22 50 Q 18 60, 18 75 Q 18 90, 22 100"/>
                <path d="M 14 55 Q 9 65, 9 75 Q 9 85, 14 95"/>
                <path d="M 118 50 Q 122 60, 122 75 Q 122 90, 118 100"/>
                <path d="M 126 55 Q 131 65, 131 75 Q 131 85, 126 95"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#8FAF94" letter-spacing="0.08em">RELIEF</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">system relaxes</text>
            </g>
          </svg>
          <div class="art-figcaption">The mechanism is not mysterious. Motion restored leads to muscles releasing leads to the nervous system normalizing — and the protective pain response stops.</div>
        </figure>

        <p>The adjustment restores motion to that specific joint. Not by force, but by precision: the chiropractor’s hands localize the segment, set up the angle, and apply a quick low-amplitude thrust within the joint’s normal range of motion. Patients often describe immediate relief — sometimes dramatically so — and that is not placebo. The mechanism is real: motion restored leads to muscles releasing leads to the nervous system input normalizing leads to the protective pain response stopping.</p>

        <p>That is the whole story, in mechanical terms. There is no "energy field," no realignment of the spine like a bent fender, no permanent fix that has to be maintained forever. Joints get stuck and joints get unstuck. The work is mechanical, and the explanation does not require believing in anything.</p>

        <h2 class="art-h2"><span class="art-h2-num">03</span>What it helps with, and what it does not</h2>

        <p>This is the honest answer.</p>

        <p>Chiropractic has strong evidence — meaning real research, in real journals, comparing real outcomes — for several conditions: lower back pain, both acute and chronic; neck pain; tension and cervicogenic headaches; sciatica and related radiating pain; joint restrictions throughout the spine and ribcage; and a range of pregnancy-related and pediatric musculoskeletal complaints.</p>

        <p>For these, chiropractic care is at least as effective as standard medical care, often with fewer side effects and faster relief. That is what the research says, not marketing.</p>

        <p>What chiropractic does not treat: cancer, infections, organ disease, mental health conditions, serious neurological disease. These need medical workups, not adjustments. Any chiropractor who promises to cure those things is a chiropractor to avoid. The wider claims that occasionally make their way into the public imagination are not the profession most chiropractors practice or stand by.</p>

        <div class="art-callout">
          <div class="art-callout-label">In Plain Terms</div>
          <p class="art-callout-body">Chiropractic is mechanical care for mechanical problems. It does not need to claim more than that to be valuable. The honest framing of the work — joints, muscles, nerves, pain — is the entire job.</p>
        </div>

        <h2 class="art-h2"><span class="art-h2-num">04</span>The myths worth clearing up</h2>

        <p>A few persistent misunderstandings.</p>

        <p><strong>"It is just cracking bones."</strong> The pop is not the treatment. The treatment is the targeted motion. Many adjustments do not produce any sound at all, and they work just as well. Some techniques — Activator, gentle mobilization, drop-table — never produce a pop and are used routinely with patients who prefer them.</p>

        <p><strong>"Once you start, you have to go forever."</strong> Mostly wrong. Acute episodes typically resolve in a few visits over a few weeks. Chronic issues may benefit from maintenance care, the same way someone with chronic back issues might benefit from regular massage or yoga — but the choice is the patient’s, not the chiropractor’s. Nobody is locked in.</p>

        <p><strong>"It hurts."</strong> A skilled adjustment is fast, precise, and usually painless. Some soreness in the surrounding muscles afterward is normal for the first day, the same way it would be after deep tissue work. If something genuinely hurts during care, the patient should say so, and the chiropractor should adjust the approach.</p>

        <p><strong>"It is not real medicine."</strong> Chiropractors share a licensing framework with physicians, dentists, and other regulated healthcare providers. Chiropractic education includes anatomy, physiology, pathology, imaging, and clinical diagnosis. The profession has its limits — same as every other profession — but the work is grounded in mainstream science.</p>

        <div class="art-pullquote">Chiropractic is mechanical care for mechanical problems. The pop is not the treatment, the relief is not the placebo, and nobody is locked into care forever.</div>

        <h2 class="art-h2"><span class="art-h2-num">05</span>What a first visit actually looks like</h2>

        <p>For anyone who has never been: the first visit is mostly conversation.</p>

        <p>The chiropractor will ask detailed questions about the problem — how it started, what makes it worse, what makes it better, what has been tried already. They will likely ask about past injuries, medical history, current medications, and overall lifestyle. Imaging is sometimes ordered, but more often not; the diagnosis usually comes from the exam itself.</p>

        <p>The exam is hands-on: testing how the joints move, what muscles are tight, where the patient is tender, and how the spine moves through its range. Specific tests may be used depending on the complaint.</p>

        <p>If chiropractic is appropriate, treatment can usually begin the same day. If something else is going on — something better suited to a physician, a physical therapist, an imaging workup — a good chiropractor will say so and refer accordingly. A first visit ends with a clear plan: what was found, what the approach will be, how many visits to expect, and what success looks like. No commitment to lifelong care. No mystical claims. Just an honest assessment and a clear next step.</p>

        <div class="art-warning">
          <div class="art-warning-label">A few situations warrant a physician first</div>
          <ul>
            <li><strong>New severe neck or back pain following a major injury</strong> — a fall, a car accident.</li>
            <li><strong>Numbness, tingling, or weakness in the groin or saddle area</strong>, or new trouble with bladder or bowel control.</li>
            <li><strong>Back or neck pain with a fever</strong>, or a history of cancer.</li>
            <li><strong>Progressive weakness or loss of function</strong> in an arm or leg.</li>
          </ul>
        </div>

        <p>A good chiropractor will recognize these on intake and refer out appropriately. But it is reasonable for a patient to know what is in their own corner.</p>

        <div class="art-end-mark">· · ·</div>

        <div class="art-footer">
          <strong>About this guide.</strong> This is general patient education and is not medical advice for any specific person. Chiropractic is one of several evidence-supported approaches to musculoskeletal care, and the right approach for any individual depends on their specific situation, history, and goals. Any concerns about a specific symptom should go directly to the treating chiropractor or another medical provider. If symptoms feel like a medical emergency, call 911 or go to the nearest emergency department.
        </div>
      </div>
    `
  },

  'headaches': {
    title: 'Headaches and migraines',
    headTitle: 'Life stages & special topics',
    body: `
      <div class="art-kicker">Special Topics</div>
      <h1 class="art-h1">Most "migraines" are not actually migraines.</h1>
      <p class="art-deck">A practical guide to telling the three main kinds of headache apart, why the distinction matters, and what actually helps for each.</p>
      <div class="art-byline">A short read · About 5 minutes · <strong>For anyone who reaches for ibuprofen more than once a week</strong></div>

      <div class="art-body">
        <p class="art-lede">"Headache" and "migraine" are two of the most casually-thrown-around medical terms in everyday English. Most people use them interchangeably. Many people use "migraine" to mean "headache that hurts a lot." And almost everyone has, at some point, popped two ibuprofen and gotten on with their day without ever asking what is actually happening up there.</p>

        <p>This article is about what is actually happening up there.</p>

        <h2 class="art-h2"><span class="art-h2-num">01</span>The three usual suspects</h2>

        <p>About 90% of recurring headaches fall into three categories: tension-type, cervicogenic, and migraine. Each has a different mechanism, a different pattern, and a different treatment. Telling them apart is the most useful thing a patient can do for themselves.</p>

        <p><strong>Tension-type</strong> is the most common. The mechanism is what the name says: muscles in the head, neck, and shoulders get tight, and the tightness produces a steady, often bilateral ache — usually described as a band, a tight cap, or pressure around the whole head. It tends to build through the day, peak in the evening, and ease with sleep. People with desk jobs, screens, and chronic stress are its main customers.</p>

        <p><strong>Cervicogenic</strong> headaches start in the neck and refer pain into the head. The mechanism is covered in the cervical strain article in detail; short version, the top three vertebrae of the neck share nerve pathways with the back of the head, the temples, and the area behind the eyes. When those joints get restricted, the body refers pain forward. These are often mistaken for migraines because they can be one-sided and intense.</p>

        <p><strong>Migraines</strong> are a different animal. They are a neurological event, not a muscle problem. The mechanism involves the brain’s pain-processing systems going into a temporary altered state — vessels dilate, nerves fire, and the result is the classic migraine: usually one-sided, often pulsating, often accompanied by nausea, sensitivity to light or sound, and sometimes visual disturbances (the "aura"). Real migraines come in attacks that last hours to days, not background aches.</p>

        <figure class="art-figure">
          <svg viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three head diagrams showing tension-type, cervicogenic, and migraine pain patterns">
            <defs>
              <clipPath id="clip-cerv"><circle cx="70" cy="68" r="30"/></clipPath>
              <clipPath id="clip-mig"><circle cx="70" cy="68" r="30"/></clipPath>

              </g>
              <text x="70" y="126" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C8B89A" letter-spacing="0.08em">TENSION-TYPE</text>
              <text x="70" y="139" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">band, both sides</text>
            </g>
            <g transform="translate(225, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(196,122,122,.08)" stroke="#C47A7A" stroke-width="1.5"/>
              <rect x="62" y="96" width="16" height="18" rx="3" fill="rgba(232,226,217,.25)" stroke="#A89F94" stroke-width="1.2"/>

              <circle cx="60" cy="66" r="1.4" fill="#6B6560"/>

                <path d="M 84 95 Q 90 80, 86 62"/>
                <polyline points="83,66 86,62 89,65"/>
              </g>
              <text x="70" y="126" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C47A7A" letter-spacing="0.08em">CERVICOGENIC</text>
              <text x="70" y="139" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">from the neck, one side</text>
            </g>
            <g transform="translate(415, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(196,122,122,.08)" stroke="#C47A7A" stroke-width="1.5"/>
              <circle cx="70" cy="68" r="30" fill="rgba(232,226,217,.25)" stroke="#A89F94" stroke-width="1.4"/>
              <g clip-path="url(#clip-mig)">
                <rect x="70" y="38" width="40" height="60" fill="rgba(196,122,122,.40)"/>
              </g>
              <circle cx="60" cy="66" r="1.4" fill="#6B6560"/>
              <circle cx="80" cy="66" r="2.2" fill="none" stroke="#C47A7A" stroke-width="1.5"/>
              <g stroke="#C47A7A" stroke-width="1.3" fill="none" opacity="0.85">
                <polyline points="95,52 99,48 95,44 99,40"/>
              </g>
              <text x="70" y="126" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C47A7A" letter-spacing="0.08em">MIGRAINE</text>
              <text x="70" y="139" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">one-sided, often with aura</text>
            </g>
          </svg>
          <div class="art-figcaption">Three patterns, three mechanisms, three different treatment paths. Knowing which one you have is the first step.</div>
        </figure>

        <h2 class="art-h2"><span class="art-h2-num">02</span>Why the distinction matters</h2>

        <p>Most patients who say they get "migraines" do not actually have migraines. They have tension-type or cervicogenic headaches that hurt enough to feel migraine-like.</p>

        <p>This is not a small distinction. The three types respond to different things. A true migraine usually needs medical management — abortive medications, sometimes preventives, occasionally a neurologist’s care for severe cases. A tension-type or cervicogenic headache typically responds beautifully to mechanical care, hydration, sleep, and stress management — none of which will do much for a real migraine.</p>

        <p>The pointing test is useful here too. If the finger lands evenly across the forehead or temples on both sides, it is probably tension-type. If the finger starts at the base of the skull and traces up one side toward the eye, it is probably cervicogenic. If the pain is throbbing, one-sided, comes with nausea or light sensitivity, and stops a person from functioning, it may be a real migraine.</p>

        <div class="art-callout">
          <div class="art-callout-label">In Plain Terms</div>
          <p class="art-callout-body">Most people who say they get migraines actually get tension-type or cervicogenic headaches. The distinction matters because the three respond to different things — treating a tension headache like a migraine (or the reverse) wastes time and effort.</p>
        </div>

        <h2 class="art-h2"><span class="art-h2-num">03</span>What actually helps</h2>

        <p>Different types, different answers, though the foundation overlaps.</p>

        <p><strong>For tension-type and cervicogenic headaches:</strong></p>

        <p><strong>Treat the neck.</strong> Adjustment of the upper cervical joints often resolves these in one or two visits, especially when caught before they become a daily pattern.</p>

        <p><strong>Look up.</strong> The forward-head story from the cervical article applies here directly. Every hour of phone scrolling builds tension; every break with the head tilted gently back undoes some of it.</p>

        <p><strong>Hydrate, sleep, breathe.</strong> Dehydration is one of the most reliable triggers. So is poor sleep. So is unrelenting stress without recovery.</p>

        <p><strong>Address the muscles.</strong> Heat, gentle pressure, and basic stretches for the upper traps and suboccipital muscles often reduce frequency on their own.</p>

        <p><strong>For migraines:</strong></p>

        <p><strong>Identify the triggers.</strong> Common ones include dehydration, missed meals, hormonal cycles, poor sleep, certain foods (red wine, aged cheese), strong smells, and weather changes. Keeping a migraine diary for two months is more useful than most people expect.</p>

        <p><strong>Work with a physician.</strong> Modern migraine medications are dramatically better than they were even a decade ago. Triptans for acute attacks, CGRP-blocking medications for prevention, and lifestyle protocols all have strong evidence.</p>

        <p><strong>Chiropractic care can still help.</strong> Specifically, addressing the neck restrictions that often accompany migraines can reduce frequency and severity, even though it does not treat the neurological event itself. Many people have a tension or cervicogenic component on top of their migraine pattern, and treating that component changes the picture more than they expect.</p>

        <div class="art-pullquote">About 90% of recurring headaches are mechanical — muscles, joints, and the nervous system responding to a body asked to hold positions it was not designed for. Mechanical problems respond to mechanical care.</div>

        <h2 class="art-h2"><span class="art-h2-num">04</span>When a headache is genuinely worrying</h2>

        <p>Most headaches are uncomfortable but unconcerning, even when they are severe. A small subset signal something that needs urgent attention.</p>

        <div class="art-warning">
          <div class="art-warning-label">Skip the chiropractor and seek emergency care if</div>
          <ul>
            <li><strong>A sudden, severe headache</strong> that feels unlike anything before — "the worst headache of my life" is the classic warning sign.</li>
            <li><strong>Headache with fever, neck stiffness, and confusion</strong> — can signal meningitis. Same-day emergency care.</li>
            <li><strong>A headache that started after a head injury</strong> and is worsening over hours or days.</li>
            <li><strong>A brand-new headache pattern in someone over 50</strong>, especially with vision changes or scalp tenderness.</li>
            <li><strong>Headache with weakness, numbness, slurred speech, or other neurological symptoms</strong> — stroke screening is warranted.</li>
            <li><strong>A new headache pattern in someone with a history of cancer.</strong></li>
          </ul>
        </div>

        <p>None of these are common. But each one is a "call an ambulance or go to the ER today" situation, not a "schedule a visit next week" one.</p>

        <p>For everything else — the band around the head, the pressure that builds through the workday, the recurring pattern that nothing seems to explain — there is a real chance the source is mechanical, and a real chance the right care will resolve it.</p>

        <div class="art-end-mark">· · ·</div>

        <div class="art-footer">
          <strong>About this guide.</strong> This is general patient education and is not medical advice for any specific person. Headaches and migraines have many possible causes, and the patterns described here are typical but not universal. Recurring or severe headaches deserve a clinical evaluation by a chiropractor, physician, or neurologist who can examine the patient directly. If symptoms feel like a medical emergency, call 911 or go to the nearest emergency department.
        </div>
      </div>
    `
  },

  'stress-nervous-system': {
    title: 'Stress and the nervous system',
    headTitle: 'Habits & wellness',
    body: `
      <div class="art-kicker">Habits & Wellness</div>
      <h1 class="art-h1">Your nervous system is supposed to switch off. Most do not.</h1>
      <p class="art-deck">A practical look at why modern stress is different from the stress humans evolved to handle, what chronic activation does to the body, and the tools that actually move the needle.</p>
      <div class="art-byline">A short read · About 5 minutes · <strong>For anyone whose shoulders are creeping up to their ears as they read this</strong></div>

      <div class="art-body">
        <p class="art-lede">The nervous system was designed for short, intense bursts of stress followed by long periods of recovery. The lion appears. You run. The lion gives up. You eat berries and tell the story for the rest of your life. That is the system humans were built for.</p>

        <p>Modern life replaced the lion with traffic, deadlines, screens, notifications, news, and other people’s opinions on the internet. None of these eat you. All of them activate the same alarm system. The body is having the same response to email at 11pm that it would have to a predator on the savanna, and the alarm never turns off.</p>

        <p>This article is about what is happening underneath that, and what to do about it.</p>

        <h2 class="art-h2"><span class="art-h2-num">01</span>Two systems, one body</h2>

        <p>The nervous system has two halves that take turns. The <strong>sympathetic nervous system</strong> is the "fight or flight" half — the alarm system. It speeds the heart, raises blood pressure, tightens muscles, sharpens vision, and shunts blood away from digestion and toward the major muscle groups. It is meant to handle emergencies.</p>

        <p>The <strong>parasympathetic nervous system</strong> is the opposite — "rest and digest." It slows the heart, deepens breathing, relaxes muscles, supports digestion, and lets the body repair itself. Most of the body’s actual repair work happens in this state.</p>

        <p>A healthy nervous system switches between the two many times a day. Stress arrives, sympathetic activates, you handle the thing, parasympathetic comes back online, you recover. The whole cycle takes minutes.</p>

        <figure class="art-figure">
          <svg viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three states of the nervous system: regulated, acute stress, chronic stress">
            <g transform="translate(35, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(143,175,148,.10)" stroke="#8FAF94" stroke-width="1.5"/>
              <circle cx="70" cy="38" r="13" fill="rgba(232,226,217,.25)" stroke="#A89F94" stroke-width="1.3"/>
              <path d="M 38 60 Q 70 58, 102 60 L 100 90 L 40 90 Z" fill="rgba(232,226,217,.20)" stroke="#A89F94" stroke-width="1.3"/>
              <g stroke="#8FAF94" stroke-width="1.5" fill="none">
                <path d="M 30 108 Q 45 100, 60 108 Q 75 116, 90 108 Q 105 100, 110 108"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#8FAF94" letter-spacing="0.08em">REGULATED</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">rest, digest, repair</text>
            </g>
            <g transform="translate(225, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(200,184,154,.10)" stroke="#C8B89A" stroke-width="1.5"/>
              <circle cx="70" cy="36" r="13" fill="rgba(232,226,217,.25)" stroke="#A89F94" stroke-width="1.3"/>
              <path d="M 38 54 Q 70 52, 102 54 L 100 90 L 40 90 Z" fill="rgba(232,226,217,.20)" stroke="#A89F94" stroke-width="1.3"/>
              <g stroke="#C8B89A" stroke-width="1.5" fill="none">
                <path d="M 30 108 L 42 108 L 50 96 L 58 120 L 66 100 L 74 116 L 82 100 L 90 108 L 110 108"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C8B89A" letter-spacing="0.08em">ACUTE</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">useful, short-term alarm</text>
            </g>
            <g transform="translate(415, 25)">
              <rect x="0" y="0" width="140" height="150" rx="10" fill="rgba(196,122,122,.08)" stroke="#C47A7A" stroke-width="1.5"/>
              <circle cx="70" cy="40" r="13" fill="rgba(232,226,217,.25)" stroke="#A89F94" stroke-width="1.3"/>
              <path d="M 38 48 Q 70 46, 102 48 L 100 90 L 40 90 Z" fill="rgba(232,226,217,.20)" stroke="#A89F94" stroke-width="1.3"/>
              <g stroke="#C47A7A" stroke-width="1.3" fill="none" opacity="0.85">
                <line x1="38" y1="52" x2="32" y2="48"/>
                <line x1="38" y1="58" x2="30" y2="58"/>
                <line x1="102" y1="52" x2="108" y2="48"/>
                <line x1="102" y1="58" x2="110" y2="58"/>
              </g>
              <g stroke="#C47A7A" stroke-width="1.5" fill="none">
                <path d="M 30 108 L 40 102 L 48 114 L 55 104 L 62 112 L 70 102 L 78 113 L 86 105 L 94 112 L 102 104 L 110 110"/>
              </g>
              <text x="70" y="180" text-anchor="middle" font-family="DM Sans" font-size="11" font-weight="700" fill="#C47A7A" letter-spacing="0.08em">CHRONIC</text>
              <text x="70" y="198" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#9CA0A6">stuck in fight or flight</text>
            </g>
          </svg>
          <div class="art-figcaption">The body is built for the middle one — short, intense, then over. Modern life often produces the right one, where the alarm never resets.</div>
        </figure>

        <p>The problem is not that stress exists. The problem is that for many people, the alarm system is on most of the time and the recovery system rarely gets a turn. The body interprets a 60-hour work week the same way it interprets running from a predator, except there is no end to the run.</p>

        <h2 class="art-h2"><span class="art-h2-num">02</span>What chronic activation actually does</h2>

        <p>When the sympathetic nervous system is running for hours or days at a time, every system it touches starts to wear.</p>

        <p><strong>Muscles stay tight.</strong> The upper trapezius is the body’s tension reservoir. So are the jaw muscles (which is why so many stressed people grind their teeth), the small muscles around the eyes, and the deep core stabilizers. Tightness in these places is often the first symptom — before the patient realizes stress is the upstream cause.</p>

        <p><strong>Breathing gets shallow.</strong> Chronic sympathetic activation pushes breathing higher into the chest, faster, and with less depth. Shallow breathing reinforces the alarm signal to the brain — the body assumes that if breathing is panicked, there must be a reason to panic — creating a loop.</p>

        <p><strong>Digestion struggles.</strong> The gut runs on parasympathetic activity. Chronic sympathetic state explains a surprising amount of bloating, reflux, and irregular bowel patterns that get worked up extensively without ever finding a "cause."</p>

        <p><strong>Sleep degrades.</strong> Falling asleep requires parasympathetic dominance. People stuck in sympathetic state often describe lying in bed exhausted but unable to switch off. The brain knows it should sleep; the alarm system is still running.</p>

        <p><strong>The immune system slows.</strong> Repair happens during parasympathetic activity. Chronic stress reliably correlates with slower healing, more frequent illness, and worse recovery from injury.</p>

        <h2 class="art-h2"><span class="art-h2-num">03</span>Why the neck and shoulders take the worst of it</h2>

        <p>This is the part that connects directly to chiropractic care.</p>

        <p>The upper neck and shoulders are physically and functionally linked to the autonomic nervous system in a way the rest of the body is not. The vagus nerve, the main carrier of parasympathetic signal in the body, runs through the upper neck. The muscles in this region directly modulate signals to the brainstem. Tension here does not just feel like tension — it actively reinforces the stress state.</p>

        <p>Most patients with chronic neck and shoulder tension are not just physically stressed; they are physiologically stressed. The two patterns travel together. Working on the neck mechanically — adjustment, soft tissue work, mobility exercises — usually produces a parasympathetic shift the patient can feel. Heart rate drops. Breathing deepens. A wave of fatigue often hits as the body finally gets permission to recover.</p>

        <p>This is why patients sometimes describe a chiropractic visit as feeling "settled" or "calm" beyond the pain relief itself. It is not imagination. It is the nervous system getting a brief but real shift toward the rest-and-digest side.</p>

        <div class="art-callout">
          <div class="art-callout-label">In Plain Terms</div>
          <p class="art-callout-body">Stress is not just in your head. Your nervous system has a physical pattern, and that pattern shows up in your shoulders, your jaw, your breath, and your sleep. The shoulders did not start it, but they will keep it going if nobody addresses them.</p>
        </div>

        <h2 class="art-h2"><span class="art-h2-num">04</span>What actually moves the needle</h2>

        <p>The tools that work for chronic sympathetic activation are simpler than self-help books suggest. None of them require an app, a course, or a guru.</p>

        <p><strong>Walk.</strong> Twenty minutes a day, outdoors if possible. Walking shifts the nervous system toward parasympathetic faster and more reliably than almost anything else. The combination of rhythmic movement, mild aerobic load, and a natural environment hits the brain in a specific way that has been studied extensively. It does not need to be long. It does need to be regular.</p>

        <p><strong>Slow down the breath.</strong> Six breaths per minute, with the exhale longer than the inhale. Two minutes of this directly activates the vagus nerve and shifts the body toward parasympathetic. It is the most underused tool in the box because it sounds too simple to work. It works.</p>

        <p><strong>Sleep enough.</strong> Repair only happens during sleep. Most adults need seven to nine hours. Cutting sleep to "get more done" is one of the worst trades a stressed person can make — it shortens the recovery window the system actually needs.</p>

        <p><strong>Move the neck.</strong> Tightness in the upper neck and traps maintains the stress signal. Daily mobility work breaks the loop. The exercises prescribed in this app for the cervical region are picked partly for this reason.</p>

        <p><strong>Get social, in person.</strong> Real human connection — not screens, not text threads — is one of the most powerful parasympathetic activators known. Twenty minutes with a friend resets the system in a way that no amount of solitary self-care can match.</p>

        <p><strong>Reduce the input.</strong> Notifications, news, scrolling, and email are all small sympathetic activations. None are dangerous on their own. Hundreds per day add up to a body that never stops being on alert. Cutting input is often more impactful than adding interventions.</p>

        <div class="art-pullquote">The shoulders did not start the stress, but they will keep it going if nobody addresses them. The nervous system has a physical pattern — work on the body, and the mind often follows.</div>

        <h2 class="art-h2"><span class="art-h2-num">05</span>When stress is something more</h2>

        <p>Most of what people call "stress" responds to the tools above. But sometimes stress is the surface symptom of something that needs different help.</p>

        <div class="art-warning">
          <div class="art-warning-label">Consider professional mental health support if</div>
          <ul>
            <li><strong>Anxiety or low mood is interfering with daily functioning</strong> — work, sleep, relationships, eating.</li>
            <li><strong>Stress reactions feel disproportionate</strong> to what is happening.</li>
            <li><strong>Symptoms of panic</strong> — racing heart, shortness of breath, dread — come in attacks.</li>
            <li><strong>Sleep is consistently poor</strong> for more than a few weeks despite good habits.</li>

        <h2 class="art-h2"><span class="art-h2-num">03</span>The one ergonomic intervention that matters</h2>

        <p>There is a lot of ergonomic advice out there. Most of it is overstated. One piece of it is essential.</p>

        <p><strong>Get the screen to eye level.</strong> Phone, tablet, laptop, monitor — whatever you are looking at, raise it so your eyes meet it without your head tilting down.</p>

        <p>This single intervention does more for neck and upper back complaints than any chair, desk, or app on the market. The reason is mechanical: the head weighs ten to twelve pounds, and every inch it leans forward of the shoulders multiplies the load on the muscles holding it up. The cervical strain article covers the physics in detail. The short version is that of all the things ergonomics can do for a body, fixing the head-forward problem is the one with the biggest return.</p>
